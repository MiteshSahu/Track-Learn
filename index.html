<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track &amp; Learn — Mitesh's Prep Tracker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<style>
:root{
  --bg:#f3f7f2;
  --panel:#ffffff;
  --panel2:#eef4ee;
  --border:#dce8dc;
  --text:#132018;
  --muted:#6f7d72;
  --accent:#20824b;
  --accent-soft:#e4f5ea;
  --accent2:#0f2418;
  --accent2-soft:#edf5ef;
  --danger:#c64242;
  --grid0:#dfe8df;
  --grid1:#bde9c4;
  --grid2:#72d184;
  --grid3:#26a848;
  --grid4:#0a7f2e;
  --radius:8px;
  --mono:'JetBrains Mono', 'SF Mono', Consolas, monospace;
  --serif:'Inter Tight', 'Inter', system-ui, sans-serif;
  --sans:'Inter', system-ui, sans-serif;
  --shadow:0 1px 2px rgba(19,32,24,0.06), 0 18px 42px rgba(37,91,49,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  letter-spacing:0;
}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ===== Top bar ===== */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.84);
  backdrop-filter:blur(14px);
  position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{
  width:42px;height:42px;border-radius:8px;
  background:var(--accent2);
  border:1px solid #173321;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:800;color:#fff;font-size:13px;
}
.brand h1{font-family:var(--serif);font-weight:800;font-size:1.32rem;color:var(--text);}
.brand .sub{color:var(--muted);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;}
.streak-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:999px;padding:9px 16px;font-size:.85rem;color:var(--muted);
  box-shadow:var(--shadow);
}
.streak-pill b{color:var(--accent);font-family:var(--mono);font-size:1rem;}
.top-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end;}
.json-status{
  width:13px;height:13px;min-width:13px;border-radius:50%;
  display:inline-block;background:#d7a72e;
  box-shadow:0 0 0 5px rgba(215,167,46,.14), 0 2px 6px rgba(19,32,24,.18);
}
.json-status.ok{background:#218447;box-shadow:0 0 0 5px rgba(33,132,71,.14), 0 2px 6px rgba(19,32,24,.18);}
.json-status.warn{background:#d7a72e;box-shadow:0 0 0 5px rgba(215,167,46,.14), 0 2px 6px rgba(19,32,24,.18);}
.json-status.bad{background:#c4453d;box-shadow:0 0 0 5px rgba(196,69,61,.14), 0 2px 6px rgba(19,32,24,.18);}
.auth-btn{
  border:1px solid var(--border);background:var(--panel);color:var(--accent);
  border-radius:999px;padding:9px 14px;font-weight:800;cursor:pointer;
  box-shadow:var(--shadow);
}
.auth-btn:hover{border-color:var(--accent);background:var(--accentSoft);}

/* ===== Progress Pie Overview ===== */
.pie-widget{
  display:flex;align-items:center;gap:16px;
  background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;
}
.pie-toggle{
  width:168px;height:168px;border-radius:50%;border:none;cursor:default;
  background:transparent;padding:0;position:relative;
  filter:drop-shadow(0 12px 24px rgba(19,32,24,.16));
}
.pie-toggle .pie-3d{
  width:100%;height:100%;border-radius:50%;
  transform:rotateX(42deg);
  position:relative;
}
.pie-toggle .pie-3d:after{
  content:"";position:absolute;left:0;right:0;top:10px;bottom:-16px;
  border-radius:50%;background:inherit;filter:brightness(.65);z-index:-1;
}
.pie-toggle .pie-center{
  position:absolute;inset:24%;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:900;font-size:1.1rem;color:var(--text);
  transform:rotateX(42deg);box-shadow:inset 0 0 0 1px var(--border);
}
.pie-panel{
  width:280px;background:transparent;border:0;border-radius:0;
  box-shadow:none;padding:0;display:block;
}
.pie-panel h4{font-family:var(--serif);font-size:.95rem;font-weight:850;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.pie-panel .pie-overall{font-family:var(--mono);font-size:.8rem;color:var(--accent);font-weight:900;}
.pie-legend{display:flex;flex-direction:column;gap:7px;max-height:190px;overflow:auto;}
.pie-legend-row{display:flex;align-items:center;gap:8px;font-size:.76rem;}
.pie-legend-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pie-legend-row .lbl{flex:1;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pie-legend-row .val{font-family:var(--mono);color:var(--muted);font-size:.7rem;flex-shrink:0;}
@media (max-width:760px){
  .pie-widget{flex-direction:column;align-items:stretch;}
  .pie-panel{width:240px;}
}
.tree-canvas .pie-widget{
  position:absolute;left:900px;top:40px;z-index:3;
  width:620px;cursor:default;
}
.tree-canvas .pie-widget .pie-panel{width:330px;}
.tree-canvas .pie-widget .pie-legend{max-height:220px;}

/* ===== Tabs ===== */
.tabs{
  display:flex;gap:6px;overflow-x:auto;
  padding:14px 28px 0 28px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.84);
  backdrop-filter:blur(14px);
  position:sticky;top:79px;z-index:45;
}
@media (max-width:700px){
  .topbar{align-items:flex-start;gap:12px;padding:14px 18px;}
  .top-actions{justify-content:flex-start;}
  .streak-pill{padding:8px 12px;font-size:.78rem;}
  .tabs{top:91px;padding-left:18px;padding-right:18px;}
  main{padding:22px 18px;}
}
.tab-btn{
  font-family:var(--sans);
  background:transparent;border:none;
  color:var(--muted);
  padding:10px 16px;border-radius:8px 8px 0 0;
  cursor:pointer;font-size:.88rem;font-weight:600;
  white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:all .15s ease;
}
.tab-btn:hover{color:var(--text);background:var(--panel2);}
.tab-btn.active{
  color:var(--accent);
  background:var(--panel);
  border-bottom:2px solid var(--accent);
  box-shadow:0 -1px 0 var(--border), 1px 0 0 var(--border), -1px 0 0 var(--border);
}

/* ===== Main ===== */
main{padding:28px;max-width:1480px;margin:0 auto;}
.view{display:none;animation:fade .25s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

h2.view-title{font-family:var(--serif);font-size:1.72rem;font-weight:800;margin-bottom:4px;}
.view-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:nowrap;position:relative;padding-right:220px;margin-bottom:18px;}
.view-header > div:first-child{flex:1 1 auto;min-width:0;}
.view-header .view-title{margin-bottom:4px;}
.view-header-actions{display:flex;gap:10px;flex:0 0 auto;margin-top:2px;margin-left:auto;align-items:center;flex-wrap:wrap;justify-content:flex-end;position:absolute;right:0;top:0;}
@media (max-width:760px){
  .view-header{flex-wrap:wrap;padding-right:0;}
  .view-header-actions{position:static;margin-left:0;justify-content:flex-start;}
}

/* ===== Modal ===== */
.modal-trigger-btn{
  height:40px;border-radius:999px;background:var(--accent);color:#fff;border:none;
  display:inline-flex;align-items:center;gap:8px;padding:0 18px;font-size:.82rem;font-weight:900;cursor:pointer;
  box-shadow:var(--shadow);text-transform:uppercase;letter-spacing:.05em;
  transition:background .15s ease;
}
.modal-trigger-btn:hover{background:var(--accent2);}
.edit-mode-toggle{
  height:40px;border-radius:999px;background:var(--panel);color:var(--accent);border:1px solid var(--border);
  display:inline-flex;align-items:center;gap:8px;padding:0 18px;font-size:.82rem;font-weight:900;cursor:pointer;
  box-shadow:var(--shadow);text-transform:uppercase;letter-spacing:.05em;
}
.edit-mode-toggle.active{background:#fff4d8;border-color:#efd28b;color:#926000;}
.edit-actions{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.edit-icon{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--accent);
  display:inline-flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;cursor:pointer;
}
.edit-icon:hover{background:var(--accent-soft);border-color:#9bd7a9;}
.edit-icon.delete{color:var(--danger);}
.edit-icon.delete:hover{background:#fff0f0;border-color:#efb1b1;}
.section-title-row{display:flex;align-items:center;gap:10px;margin:0 0 10px;}
.section-title-row .dsa-section-title,.section-title-row .category-title{margin:0;flex:1;}
.create-edit-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.view-header-actions .add-control,.create-edit-row .add-control{position:relative;right:auto;top:auto;margin:0;z-index:35;}
.view-header-actions .add-popover,.create-edit-row .add-popover{right:0;left:auto;}
.modal-overlay{
  position:fixed;inset:0;background:rgba(19,32,24,.42);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:0 24px 64px rgba(19,32,24,.22);width:min(560px,100%);max-height:90vh;overflow:auto;
  padding:22px;position:relative;animation:modalIn .18s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-box h3{font-family:var(--serif);font-size:1.15rem;font-weight:850;margin-bottom:14px;padding-right:30px;}
.modal-close{
  position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);background:#fff;color:var(--text);font-size:1rem;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;
  transition:background .15s ease,color .15s ease;
}
.modal-close:hover{background:var(--danger);color:#fff;border-color:var(--danger);}
.modal-fields{display:flex;gap:10px;flex-wrap:wrap;}
.modal-fields input,.modal-fields select{
  min-width:0;flex:1;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.86rem;
}
.modal-fields .wide{flex-basis:100%;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
.view-desc{color:var(--muted);font-size:.9rem;margin-bottom:22px;}

/* ===== Generic Topic Tab (Core Java, Spring, etc.) ===== */
.progress-overview{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;margin-bottom:24px;
}
.stat-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow);
}
.stat-card .num{font-family:var(--serif);font-size:2rem;font-weight:850;color:var(--text);}
.stat-card .lbl{color:var(--muted);font-size:.75rem;margin-top:4px;text-transform:uppercase;letter-spacing:.09em;font-weight:800;}
.bar-track{height:8px;border-radius:99px;background:var(--panel2);overflow:hidden;margin-top:10px;}
.bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;}

.subtopic-list{display:flex;flex-direction:column;gap:8px;}
.subtopic-row{
  display:flex;align-items:center;gap:12px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;
  box-shadow:var(--shadow);
  cursor:pointer;
}
.subtopic-row label{flex:1;font-size:.88rem;cursor:pointer;}
.subtopic-row label.done{color:var(--text);text-decoration:none;}
.subtopic-row input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;}
.subtopic-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
}
.subtopic-card.dragging,.q-card.dragging{opacity:.45;}
.subtopic-card[draggable="true"],.q-card[draggable="true"]{cursor:grab;}
.subtopic-card.done{border-color:#88d29a;background:#fbfffb;}
.subtopic-row{box-shadow:none;border:0;border-radius:0;}
.subtopic-row .subtopic-title{flex:1;font-size:.9rem;font-weight:700;line-height:1.45;}
.subtopic-row .subtopic-title.done{color:var(--text);text-decoration:none;}
.subtopic-body{padding:0 14px 14px 44px;}
.subtopic-progress{height:7px;border-radius:99px;background:var(--panel2);overflow:hidden;margin:2px 0 10px;}
.subtopic-progress span{display:block;height:100%;width:var(--pct);background:var(--accent);border-radius:inherit;}
.nested-list{display:flex;flex-direction:column;gap:7px;margin-top:10px;}
.nested-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;}
.nested-row input{width:16px;height:16px;accent-color:var(--accent);}
.nested-row span{font-size:.84rem;font-weight:650;}
.add-subtopic-row{display:flex;gap:8px;margin-top:10px;}
.add-subtopic-row.closed{display:none;}
.show-subtopic-form{margin-top:10px;}
.show-subtopic-form.closed{display:none;}
.add-subtopic-row input,.add-topic-form input{flex:1;background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:.84rem;}
.add-topic-form{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;box-shadow:var(--shadow);margin-bottom:12px;display:flex;gap:8px;align-items:center;
}
.add-control{position:relative;z-index:35;}
.add-control summary{
  list-style:none;height:38px;border-radius:999px;background:var(--accent);color:#fff;
  display:grid;place-items:center;padding:0 16px;font-size:.82rem;font-weight:900;cursor:pointer;box-shadow:var(--shadow);
  text-transform:uppercase;letter-spacing:.05em;
}
.add-control summary::-webkit-details-marker{display:none;}
.add-control[open] summary{background:var(--accent2);}
.add-popover{
  position:absolute;right:0;top:46px;z-index:20;width:min(520px,calc(100vw - 56px));
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:12px;display:flex;gap:8px;flex-wrap:wrap;
}
.add-popover input,.add-popover select{min-width:0;flex:1;background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:.84rem;}
.add-popover .wide{flex-basis:100%;}
.add-popover .btn{white-space:nowrap;}
.topic-note-panel{
  display:none;border-top:1px solid var(--border);background:#f8f9fd;
  padding:14px 16px;
}
.topic-note-panel.open{display:block;}
.topic-note-panel textarea,.topic-note-panel input{
  width:100%;background:#fff;border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:10px 12px;font-size:.82rem;
  font-family:var(--mono);line-height:1.5;resize:none;margin-bottom:8px;overflow:hidden;
}
.topic-note-panel input{font-family:var(--sans);resize:none;}
.topic-note-panel textarea{min-height:100px;}
.topic-note-panel.note-expanded textarea{min-height:52vh;}
.topic-note-panel .saved-link{font-size:.78rem;margin-bottom:8px;display:block;}
.link-form{display:none;grid-template-columns:160px minmax(0,1fr) auto;gap:8px;margin-bottom:8px;}
.link-form.open{display:grid;}
.link-form input{margin-bottom:0!important;}
.link-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.link-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid #b9e6c2;background:#f6fbf7;border-radius:999px;padding:5px 9px;font-size:.76rem;font-weight:800;}
.link-chip a{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-chip button{border:0;background:transparent;color:var(--danger);cursor:pointer;font-weight:900;}
.note-dot{font-size:.68rem;font-weight:900;color:var(--accent);background:var(--accent-soft);border:1px solid #b9e6c2;border-radius:999px;padding:4px 8px;white-space:nowrap;}
.row-actions{display:flex;gap:8px;flex-wrap:wrap;}
.topic-workspace{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;align-items:start;}
@media (max-width:1050px){.topic-workspace{grid-template-columns:1fr;}}
.topic-main{position:relative;}
.topic-side{display:flex;flex-direction:column;gap:18px;}
.topic-workspace.with-create .topic-side{margin-top:0;}
.topic-side .donut-card.single{width:100%;margin:0;}
.compact-progress-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow);
}
.compact-progress-card h3{font-family:var(--serif);font-size:1rem;font-weight:850;margin-bottom:12px;}
.compact-progress-card .topic-bar-row{gap:10px;margin-bottom:10px;}
.compact-progress-card .topic-bar-row .tname{width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.compact-progress-card .topic-bar-row .bar-track{height:10px;}
.compact-progress-card .topic-bar-row .bval{width:52px;}

.jump-tabs{
  display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px;
  position:sticky;top:132px;z-index:30;background:rgba(243,247,242,.86);
  padding:8px 0;backdrop-filter:blur(10px);
}
.jump-tab{
  border:1px solid var(--border);background:var(--panel);color:var(--muted);
  border-radius:999px;padding:8px 14px;font-size:.8rem;font-weight:800;cursor:pointer;
}
.jump-tab:hover{color:var(--accent);border-color:#9bd7a9;background:var(--accent-soft);}
.category-section{scroll-margin-top:190px;margin-bottom:24px;}
.category-title{font-family:var(--serif);font-size:1.08rem;font-weight:900;margin:0 0 10px;color:var(--text);}
.category-title span{color:var(--muted);font-family:var(--mono);font-size:.76rem;font-weight:800;margin-left:8px;}
.compact-progress-card .topic-bar-row .tname{width:160px;}
.page-search{
  position:relative;display:block;margin:0 0 8px;
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px;box-shadow:var(--shadow);
}
.page-search .search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none;}
.page-search input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px 10px 34px;font-size:.88rem;}
.search-results{display:none;position:absolute;left:10px;right:10px;top:54px;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);z-index:80;max-height:280px;overflow:auto;}
.search-results.open{display:block;}
.search-result{display:block;width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--border);padding:10px 12px;font-size:.82rem;font-weight:750;color:var(--text);cursor:pointer;}
.search-result:hover{background:var(--accent-soft);color:var(--accent);}
.search-result:last-child{border-bottom:0;}

/* ===== Notes side panel layout ===== */
.split{display:grid;grid-template-columns:1fr 360px;gap:22px;align-items:start;}
@media (max-width:1000px){.split{grid-template-columns:1fr;}}
.notes-panel{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
  position:sticky;top:142px;max-height:calc(100vh - 160px);
  display:flex;flex-direction:column;
  box-shadow:var(--shadow);
}
.notes-panel h3{font-family:var(--serif);font-size:1.1rem;margin-bottom:4px;font-weight:800;}
.notes-panel .hint{color:var(--muted);font-size:.78rem;margin-bottom:12px;}
.notes-panel select, .notes-panel textarea, .notes-panel input{
  width:100%;background:var(--panel2);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:10px 12px;font-size:.85rem;
  font-family:var(--sans);margin-bottom:10px;resize:vertical;
}
.notes-panel textarea{min-height:140px;font-family:var(--mono);font-size:.8rem;line-height:1.5;}
.btn{
  background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:10px 16px;font-weight:700;font-size:.85rem;cursor:pointer;
  transition:opacity .15s;
}
.btn:hover{opacity:.85;}
.btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border);}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn.small{padding:6px 12px;font-size:.75rem;}
.btn.unsaved{background:#f4b83f;color:#132018;border-color:#d59b19;}
.notes-list{flex:1;display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.note-item{
  background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px;
}
.note-item .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.note-item .tag{font-size:.7rem;color:var(--accent);background:var(--accent-soft);padding:2px 8px;border-radius:99px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.note-item .body{font-family:var(--mono);font-size:.78rem;white-space:pre-wrap;color:var(--text);line-height:1.5;}
.note-item .ylink{font-size:.78rem;display:block;margin-top:6px;}
.note-item .del{font-size:.7rem;color:var(--danger);cursor:pointer;background:none;border:none;}

/* ===== DSA Tab ===== */
.dsa-layout{display:block;}
.heatmap-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:18px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;
}
.heatmap-card .heatmap-shell{flex:1;display:flex;align-items:center;}
.heatmap-card h3,.topic-chart-card h3{font-family:var(--serif);font-size:.95rem;margin-bottom:8px;font-weight:800;}
.dsa-insights{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:18px;align-items:start;}
@media (max-width:1050px){.dsa-insights{grid-template-columns:1fr;}}
.heatmap-card,.topic-chart-card{margin-bottom:0;}
.heatmap-shell{overflow-x:auto;padding:4px 0 2px;overscroll-behavior-x:contain;}
.heatmap-wrap{display:flex;gap:10px;align-items:end;min-width:max-content;}
.heatmap-days{display:grid;grid-template-rows:repeat(7,9px);gap:3px;color:var(--muted);font-size:.62rem;line-height:9px;width:26px;flex:0 0 auto;padding-top:24px;}
.heatmap{display:flex;gap:14px;align-items:flex-start;min-width:max-content;}
.activity-month{display:flex;flex-direction:column;gap:6px;}
.activity-month .month-label{font-size:.72rem;font-weight:900;color:#718072;min-height:16px;}
.month-grid{display:grid;grid-template-columns:repeat(var(--weeks),10px);grid-template-rows:repeat(7,10px);gap:3px;}
.heatmap .cell,.month-grid .cell{
  width:10px;height:10px;border-radius:3px;background:var(--grid0);
  transition:transform .1s;
}
.heatmap .cell:hover{transform:scale(1.25);}
.heatmap .cell.l1{background:var(--grid1);}
.heatmap .cell.l2{background:var(--grid2);}
.heatmap .cell.l3{background:var(--grid3);}
.heatmap .cell.l4{background:var(--grid4);}
.legend{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:.68rem;color:var(--muted);justify-content:flex-end;}
.legend .cell{width:10px;height:10px;border-radius:3px;}

/* topic progress chart */
.topic-chart-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:18px;box-shadow:var(--shadow);
}
.dsa-insights .topic-chart-card{margin-bottom:0;}
.topic-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.topic-bar-row .tname{width:150px;font-size:.76rem;font-weight:700;flex-shrink:0;}
.topic-bar-row .bar-track{flex:1;height:9px;border-radius:99px;background:var(--panel2);overflow:hidden;}
.topic-bar-row .bar-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .4s ease;}
.topic-bar-row .bval{width:66px;text-align:right;font-size:.7rem;color:var(--muted);font-family:var(--mono);flex-shrink:0;}
.weekly-card{align-self:stretch;padding-bottom:8px;display:flex;flex-direction:column;justify-content:space-between;}
.weekly-chart{flex:1;height:auto;min-height:74px;margin-top:0;overflow-x:auto;overscroll-behavior-x:contain;padding-bottom:0;display:flex;align-items:flex-end;}
.weekly-chart svg{width:900px;height:72px;display:block;overflow:visible;}
.weekly-chart .axis{stroke:#d8e5d9;stroke-width:1;}
.weekly-chart .line{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
.weekly-chart .dot{fill:#fff;stroke:var(--accent);stroke-width:2;}
.weekly-chart .day{font-family:var(--mono);font-size:9px;fill:var(--muted);text-transform:uppercase;}

.dsa-summary{
  display:grid;
  grid-template-columns:minmax(310px,.72fr) minmax(260px,.68fr) minmax(460px,1.35fr);
  grid-template-areas:
    "donut weekly heatmap"
    "topic topic topic";
  gap:12px;margin-bottom:14px;align-items:stretch;
}
.dsa-summary .dsa-donut-card{grid-area:donut;}
.dsa-summary .weekly-card{grid-area:weekly;}
.dsa-summary .heatmap-card{grid-area:heatmap;}
.dsa-summary .topic-chart-card{grid-area:topic;}
.donut-card,.weekly-card,.difficulty-summary{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:14px;
}
.donut-card{display:grid;grid-template-columns:190px 1fr;gap:18px;align-items:center;background:#fff;}
.donut-card.dsa-donut-card{
  grid-template-columns:118px minmax(0,1fr);
  grid-template-rows:auto auto;
  min-height:150px;
  gap:10px;
  background:#fff;color:var(--text);border-color:var(--border);
  box-shadow:var(--shadow);
}
.dsa-donut-card .donut-wrap,.dsa-donut-card .donut{width:116px;height:116px;}
.dsa-donut-card .donut:before{inset:12px;background:linear-gradient(145deg,#fff,#eef6ef);box-shadow:inset 0 0 0 1px var(--border);}
.dsa-donut-card .donut-center b{color:var(--text);font-size:1.65rem;}
.dsa-donut-card .donut-center .denom{font-size:.78rem;font-weight:850;color:var(--text);}
.dsa-donut-card .donut-center span{color:var(--muted);text-transform:uppercase;font-size:.58rem;letter-spacing:.04em;}
.dsa-donut-card .donut-sub{grid-column:1;grid-row:2;color:var(--muted);font-size:.74rem;font-weight:850;text-align:center;}
.difficulty-stack{grid-column:2;grid-row:1 / span 2;display:flex;flex-direction:column;gap:6px;align-self:center;}
.difficulty-tile{background:#f8fbf8;border:1px solid var(--border);border-radius:8px;padding:6px 7px;text-align:center;}
.difficulty-tile b{display:block;font-size:.68rem;margin-bottom:1px;}
.difficulty-tile span{font-family:var(--mono);font-size:.72rem;font-weight:900;color:var(--text);}
.difficulty-tile.easy b{color:#139e55;}
.difficulty-tile.medium b{color:#f4b83f;}
.difficulty-tile.hard b{color:#df4d4d;}
.donut-card.single{
  grid-template-columns:112px minmax(0,1fr);
  width:360px;
  max-width:100%;
  margin:-4px 0 18px auto;
  padding:12px;
  gap:12px;
}
.donut-card.single .donut-wrap,.donut-card.single .donut{width:112px;height:112px;}
.donut-card.single .donut:before{inset:12px;}
.donut-card.single .donut-center b{font-size:1.35rem;}
.donut-card.single .donut-center span{font-size:.62rem;letter-spacing:.06em;}
.donut-card.single .donut-meta{gap:7px;}
.donut-card.single .donut-meta .metric{padding:8px 10px;}
.donut-card.single .donut-meta b{font-size:.95rem;}
.donut-card.single .donut-meta span{font-size:.62rem;}
.donut-wrap{position:relative;width:188px;height:188px;}
.donut{
  width:188px;height:188px;border-radius:50%;
  background:conic-gradient(#28a85a 0 calc(var(--easy)*1%), #f4b83f calc(var(--easy)*1%) calc((var(--easy) + var(--medium))*1%), #df4d4d calc((var(--easy) + var(--medium))*1%) calc(var(--solved)*1%), #dfe8df calc(var(--solved)*1%) 100%);
  position:relative;
}
.donut:before{
  content:"";position:absolute;inset:18px;border-radius:50%;
  background:linear-gradient(145deg,#fff,#eef6ef);
  box-shadow:inset 0 0 0 1px var(--border);
}
.donut-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;}
.donut-center b{font-size:2.35rem;line-height:1;font-weight:900;color:var(--text);}
.donut-center span{font-size:.78rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-top:4px;display:block;}
.donut-meta{display:grid;grid-template-columns:1fr;gap:10px;}
.donut-meta .metric{border:1px solid var(--border);background:#f8fbf8;border-radius:8px;padding:12px;}
.donut-meta b{display:block;font-size:1.2rem;color:var(--text);}
.donut-meta span{font-size:.72rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;}
.weekly-card h3,.difficulty-summary h3{font-family:var(--serif);font-size:1rem;font-weight:850;margin-bottom:8px;}
.difficulty-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#f8fbf8;margin-top:8px;}
.difficulty-row b{font-size:1rem;}
.difficulty-row span{font-family:var(--mono);font-size:.82rem;color:var(--muted);}
.difficulty-row.easy b{color:#139e55;}
.difficulty-row.medium b{color:#b87b00;}
.difficulty-row.hard b{color:#d54545;}
@media (max-width:1100px){
  .dsa-summary{
    grid-template-columns:1fr 1fr;
    grid-template-areas:
      "donut weekly"
      "heatmap heatmap"
      "topic topic";
  }
}
@media (max-width:1050px){.donut-card.single{width:100%;margin:0 0 18px 0;}}
@media (max-width:760px){.dsa-summary,.donut-card,.donut-card.dsa-donut-card{grid-template-columns:1fr}.donut-wrap{margin:auto;}.add-popover{flex-direction:column;}}

.dsa-cat-tabs{display:flex;gap:8px;margin:0 0 10px;flex-wrap:wrap;}
.cat-btn{
  background:var(--panel);border:1px solid var(--border);color:var(--muted);
  padding:8px 16px;border-radius:99px;font-size:.82rem;font-weight:600;cursor:pointer;
}
.cat-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.cat-progress{font-size:.78rem;color:var(--muted);margin-bottom:14px;}

.q-list{display:flex;flex-direction:column;gap:8px;}
.q-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.q-card.done{border-color:#88d29a;background:#fbfffb;}
.q-row{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:12px 16px;
  cursor:pointer;
}
.q-row input[type="checkbox"]{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.q-row .qname{flex:1 1 260px;font-size:.9rem;min-width:180px;}
.q-row .qname.done{color:var(--text);text-decoration:none;}
.q-row .ytlink{
  display:flex;align-items:center;gap:6px;
  background:var(--accent-soft);border:1px solid #b9e6c2;
  color:var(--accent);padding:6px 12px;border-radius:8px;font-size:.78rem;font-weight:700;
  flex-shrink:0;
}
.q-row .ytlink:hover{background:var(--border);text-decoration:none;}
.ytlink{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--accent-soft);border:1px solid #b9e6c2;color:var(--accent);
  padding:6px 12px;border-radius:8px;font-size:.78rem;font-weight:700;
}
.ytlink:hover{background:var(--border);text-decoration:none;}
.q-row .date-done{font-size:.7rem;color:var(--muted);width:80px;text-align:right;flex-shrink:0;}

/* revision counter */
.revision-box{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  background:#fff0f0;border:1px solid #f0b8b8;
  border-radius:8px;padding:4px 8px;
}
.revision-box.r1{background:#fff8e6;border-color:#f0d38b;}
.revision-box.r2{background:#edf8ee;border-color:#a9d9ad;}
.revision-box.r3{background:#e8f6ee;border-color:#72c78b;}
.revision-box .rlabel{font-size:.68rem;color:inherit;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-right:2px;}
.revision-box button{
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;line-height:1;font-weight:700;
}
.revision-box button:hover{background:var(--accent);color:#fff;}
.revision-box .rcount{
  font-family:var(--mono);font-weight:900;font-size:.85rem;min-width:18px;text-align:center;color:inherit;
}
.revision-box.r0{color:#b93030;}
.revision-box.r1{color:#a66b00;}
.revision-box.r2{color:#27833b;}
.revision-box.r3{color:#157634;}
.difficulty-picker{display:flex;align-items:center;flex-shrink:0;}
.diff-cycle{border:1px solid var(--border);font-size:.74rem;font-weight:900;letter-spacing:.04em;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;text-transform:uppercase;}
.diff-cycle.easy{background:#e7f8ed;color:#147333;border-color:#b9e6c2;}
.diff-cycle.medium{background:#fff4d8;color:#926000;border-color:#efd28b;}
.diff-cycle.hard{background:#ffe8e8;color:#aa2929;border-color:#efb1b1;}

/* notes toggle + per-question note panel */
.notes-toggle{
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;gap:6px;
}
.notes-toggle:hover{background:var(--border);}
.notes-toggle.has-note{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
.q-note-panel{
  display:none;border-top:1px solid var(--border);background:var(--panel2);
  padding:14px 16px;
}
.q-note-panel.open{display:block;}
.q-note-panel.note-expanded textarea{min-height:52vh;}
.q-note-panel textarea{
  width:100%;min-height:90px;background:#fff;border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:10px 12px;font-size:.8rem;
  font-family:var(--mono);line-height:1.5;resize:none;margin-bottom:8px;overflow:hidden;
}
.q-note-panel input{
  width:100%;background:#fff;border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:8px 12px;font-size:.8rem;margin-bottom:8px;
}
.optional-link{display:none;}
.optional-link.open{display:block;}
.q-note-panel .saved-link{font-size:.78rem;margin-bottom:8px;display:block;}
.q-note-panel .row-actions{display:flex;gap:8px;}
.dsa-section{scroll-margin-top:190px;margin-bottom:26px;}
.dsa-section-title{font-size:1.08rem;font-weight:900;margin:0 0 10px;}

/* ===== Stats row ===== */
.dsa-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
@media (max-width:700px){.dsa-stats{grid-template-columns:repeat(2,1fr);}}
.dsa-stats .stat-card{padding:14px 16px;}
.dsa-stats .stat-card .num{font-size:1.6rem;}
.weekly-stat{grid-column:span 2;}
@media (max-width:700px){.weekly-stat{grid-column:1 / -1;}}

/* ===== Empty state ===== */
.empty{
  border:1px dashed var(--border);border-radius:var(--radius);
  padding:40px;text-align:center;color:var(--muted);font-size:.9rem;
}

/* ===== Resource list ===== */
.resource-list{display:flex;flex-direction:column;gap:10px;}
.resource-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;
  box-shadow:var(--shadow);
  cursor:pointer;
}
.resource-item .name{font-size:.88rem;font-weight:600;}
.resource-item input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;}
.resource-item.done{border-color:#88d29a;background:#fbfffb;}
.resource-main{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.resource-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.resource-note-panel{
  display:none;background:#f8f9fd;border:1px solid var(--border);border-top:0;
  border-radius:0 0 var(--radius) var(--radius);padding:14px 16px;margin-top:-8px;margin-bottom:8px;
}
.resource-note-panel.open{display:block;}
.resource-note-panel.note-expanded textarea{min-height:52vh;}
.resource-note-panel textarea,.resource-note-panel input{
  width:100%;background:#fff;border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:10px 12px;font-size:.82rem;
  font-family:var(--mono);line-height:1.5;resize:none;margin-bottom:8px;overflow:hidden;
}
.resource-note-panel input{font-family:var(--sans);}
.resource-note-panel textarea{min-height:96px;}

/* Overall Progress Tree */
.tree-dashboard{display:grid;grid-template-columns:1fr;gap:22px;align-items:start;}
@media (max-width:1050px){.tree-dashboard{grid-template-columns:1fr;}}
.tree-card,.focus-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:22px;
}

/* Canvas / pan-zoom map */
.tree-canvas-viewport{
  position:relative;height:760px;overflow:hidden;background:#eef4f3;
  border:1px solid var(--border);border-radius:var(--radius);
  cursor:grab;touch-action:none;
}
.tree-canvas-viewport.dragging{cursor:grabbing;}
.tree-canvas-viewport.dragging .tree-node-card{pointer-events:none;}
.tree-canvas{
  position:absolute;top:0;left:0;transform-origin:0 0;
  width:2200px;height:1500px;
}
.tree-canvas svg.tree-connectors{
  position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1;
}
.tree-canvas svg.tree-connectors path{fill:none;stroke-width:2.5;stroke-linecap:round;}
.tree-node-card{
  position:absolute;background:#fff;border:2px solid var(--border);border-radius:10px;
  padding:12px 14px;width:208px;box-shadow:0 6px 18px rgba(19,32,24,.08);z-index:2;
  cursor:pointer;transition:box-shadow .15s ease, border-color .15s ease;
}
.tree-node-card:hover{box-shadow:0 10px 26px rgba(19,32,24,.14);}
.tree-node-card.root{
  width:190px;background:var(--accent2);border-color:var(--accent2);color:#fff;
}
.tree-node-card.root .tree-node-title{color:#fff;}
.tree-node-card.root .tree-node-meta{color:rgba(255,255,255,.72);}
.tree-node-card.branch{border-color:var(--node-color, var(--accent));}
.tree-node-card.complete{background:var(--accent-soft);}
.tree-node-title{font-weight:900;font-size:.86rem;color:var(--text);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.tree-node-title .open-link{font-size:.7rem;color:var(--accent);cursor:pointer;font-weight:800;white-space:nowrap;}
.tree-node-title .open-link:hover{text-decoration:underline;}
.tree-node-count{font-family:var(--mono);font-size:.68rem;font-weight:900;color:#fff;background:var(--node-color, var(--accent));border-radius:999px;padding:1px 7px;}
.tree-node-card.root .tree-node-count{background:rgba(255,255,255,.18);}
.tree-node-bar{height:8px;border-radius:99px;background:#eef0ee;overflow:hidden;margin:6px 0 6px;}
.tree-node-card.root .tree-node-bar{background:rgba(255,255,255,.18);}
.tree-node-bar span{display:block;height:100%;border-radius:99px;background:var(--node-color, var(--accent));width:var(--pct,0%);transition:width .3s ease;}
.tree-node-card.root .tree-node-bar span{background:#fff;}
.tree-node-meta{font-family:var(--mono);font-size:.7rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.tree-node-expand{font-weight:900;color:var(--node-color, var(--accent));}

/* zoom controls (Whimsical style) */
.tree-zoom-controls{
  position:absolute;bottom:16px;right:16px;z-index:10;
  display:flex;align-items:center;gap:0;background:#fff;border:1px solid var(--border);
  border-radius:999px;box-shadow:var(--shadow);overflow:hidden;
}
.tree-zoom-controls button{
  width:38px;height:38px;border:none;background:transparent;font-size:1.1rem;font-weight:900;
  color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.tree-zoom-controls button:hover{background:var(--panel2);}
.tree-zoom-pct{
  font-family:var(--mono);font-size:.78rem;font-weight:800;color:var(--muted);
  padding:0 12px;min-width:54px;text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border);
}
.tree-reset-btn{
  position:absolute;bottom:16px;left:16px;z-index:10;
  background:#fff;border:1px solid var(--border);border-radius:999px;
  padding:0 16px;height:38px;font-size:.78rem;font-weight:800;color:var(--text);
  box-shadow:var(--shadow);cursor:pointer;
}
.tree-reset-btn:hover{background:var(--panel2);}
.tree-hint{
  position:absolute;top:14px;left:14px;z-index:10;background:#fff;border:1px solid var(--border);
  border-radius:999px;padding:6px 14px;font-size:.72rem;color:var(--muted);box-shadow:var(--shadow);font-weight:700;
}
@media (max-width:900px){
  .tree-canvas-viewport{height:560px;}
  .tree-node-card{width:172px;padding:10px 12px;}
}

.tree-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;}
.tree-head h3,.focus-card h3{font-family:var(--serif);font-weight:850;font-size:1.12rem;}
.tree-count{font-family:var(--mono);font-size:.76rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.journey-tree{position:relative;padding:8px 0 8px 44px;}
.journey-tree:before{
  content:"";position:absolute;left:24px;top:28px;bottom:28px;width:3px;
  background:repeating-linear-gradient(to bottom,#cfd5e6 0 9px,transparent 9px 17px);
  border-radius:999px;
}
.tree-node{
  position:relative;display:grid;grid-template-columns:76px minmax(0,1fr) 82px;gap:16px;
  align-items:center;margin:0 0 18px;padding:16px;border:1px solid var(--border);
  border-radius:var(--radius);background:#fff;
  width:100%;font-family:var(--sans);color:var(--text);text-align:left;cursor:pointer;
  transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.tree-children{display:none;margin:-10px 0 16px 46px;border-left:2px solid var(--border);padding-left:16px;}
.tree-children.open{display:block;}
.tree-child{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:.82rem;color:var(--muted);}
.tree-child .mini-bar{height:7px;flex:1;background:var(--panel2);border-radius:99px;overflow:hidden;}
.tree-child .mini-bar span{display:block;height:100%;width:var(--pct);background:var(--accent);}
.tree-expand{display:inline-block;margin-top:4px;color:var(--accent);cursor:pointer;font-weight:900;}

/* Applications */
.applications-layout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:18px;align-items:start;}
@media (max-width:900px){.applications-layout{grid-template-columns:1fr;}}
.filter-panel,.company-panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
.company-panel{position:relative;}
.filter-panel{display:flex;flex-direction:column;gap:14px;}
.filter-panel .donut-card.single{width:100%;margin:auto 0 0;grid-template-columns:1fr;padding:12px;}
.filter-panel .donut-card.single .donut-wrap{margin:auto;}
.filter-panel .donut-card.single .donut-meta{grid-template-columns:1fr 1fr;}
.filter-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.filter-btn{border:1px solid var(--border);background:#fff;border-radius:8px;padding:9px 10px;text-align:left;font-weight:800;color:var(--muted);cursor:pointer;}
.filter-btn.active{background:var(--accent-soft);color:var(--accent);border-color:#9bd7a9;}
.company-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-top:14px;}
.company-card{border:1px solid var(--border);border-radius:var(--radius);padding:12px;background:#fff;}
.company-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px;}
.company-head b{font-size:.95rem;}
.tag-list{display:flex;gap:5px;flex-wrap:wrap;}
.company-tag{font-size:.65rem;font-weight:900;color:var(--accent);background:var(--accent-soft);border-radius:999px;padding:3px 7px;}
.company-checks{display:flex;flex-direction:column;gap:8px;}
.company-checks label{display:flex;gap:8px;align-items:center;font-size:.82rem;font-weight:700;color:var(--muted);}
.company-checks input{accent-color:var(--accent);}
.tree-node:hover{transform:translateY(-1px);border-color:#bcc8ff;box-shadow:var(--shadow);}
.tree-node:last-child{margin-bottom:0;}
.tree-node:before{
  content:"";position:absolute;left:-31px;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border-radius:50%;background:#f0f3fb;border:2px dashed #cfd5e6;
  box-shadow:0 0 0 6px #fff;
}
.tree-node.complete:before{background:var(--accent);border-color:var(--accent);}
.tree-node.active:before{background:var(--accent-soft);border:4px solid var(--accent);}
.tree-node.locked{opacity:.68;}
.tree-node .phase{font-family:var(--mono);font-weight:900;color:var(--accent);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;}
.tree-node h4{font-size:1rem;font-weight:850;margin-bottom:4px;}
.tree-node p{color:var(--muted);font-size:.8rem;line-height:1.45;}
.tree-node .node-meta{font-family:var(--mono);font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.ring{
  width:64px;height:64px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--accent) calc(var(--pct)*1%), #e7ebf5 0);
  position:relative;font-family:var(--mono);font-weight:900;color:var(--accent);font-size:.8rem;
}
.ring:after{content:"";position:absolute;inset:7px;border-radius:50%;background:#fff;}
.ring span{position:relative;z-index:1;}
.focus-list{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
.focus-item{display:flex;justify-content:space-between;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:#f8f9fd;}
.focus-item b{font-size:.86rem;}
.focus-item span{font-family:var(--mono);font-size:.75rem;color:var(--muted);}
@media (max-width:700px){
  .tree-head{flex-direction:column;}
  .journey-tree{padding-left:34px;}
  .journey-tree:before{left:17px;}
  .tree-node{grid-template-columns:62px minmax(0,1fr);gap:12px;}
  .tree-node:before{left:-27px;width:34px;height:34px;}
  .tree-node .node-meta{grid-column:2;}
  .ring{width:56px;height:56px;}
  .heatmap{gap:14px;}
  .month-grid{grid-template-columns:repeat(var(--weeks),9px);grid-template-rows:repeat(7,9px);gap:3px;}
  .heatmap .cell,.month-grid .cell{width:9px;height:9px;border-radius:3px;}
  .activity-month .month-label{font-size:.72rem;}
  .heatmap-days{display:none;}
}

/* Personal Tab */
.qa-form{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:20px;display:flex;flex-direction:column;gap:10px;
  box-shadow:var(--shadow);
}
.qa-form input, .qa-form textarea{
  width:100%;background:var(--panel2);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:10px 12px;font-size:.88rem;font-family:var(--sans);
}
.qa-form textarea{min-height:100px;resize:vertical;font-family:var(--mono);font-size:.82rem;}
.qa-list{display:flex;flex-direction:column;gap:12px;}
.qa-item{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;
  box-shadow:var(--shadow);
}
.qa-item .q{font-weight:700;font-family:var(--serif);font-size:1rem;margin-bottom:8px;color:var(--accent2);}
.qa-item .a{font-family:var(--mono);font-size:.82rem;white-space:pre-wrap;line-height:1.6;color:var(--text);}
.qa-item .meta{display:flex;justify-content:flex-end;margin-top:10px;}

footer{text-align:center;color:var(--muted);font-size:.75rem;padding:30px 0;}
</style>
</head>

const STORE_KEY = "track_learn_state_v1";
const STATE_SCHEMA_VERSION = 2;
const ACTIVE_TAB_KEY = "track_learn_active_tab";

function stableSlug(value){
  return String(value || "")
    .toLowerCase()
    .trim()
    .replace(/&/g, " and ")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 80) || "item";
}
function makeStableId(prefix, label){
  return `${prefix}-${stableSlug(label)}`;
}
function makeCustomId(label){
  const slug = stableSlug(label);
  const rand = (globalThis.crypto && crypto.randomUUID) ? crypto.randomUUID().slice(0,8) : Math.random().toString(36).slice(2,10);
  return `custom-${slug}-${rand}`;
}
function topicBuiltInKey(topicKey, title){
  return `${topicKey}::${makeStableId("topic", title)}`;
}
function dsaBuiltInKey(cat, title){
  return `${cat}::${makeStableId("q", title)}`;
}
function dsaCustomKey(cat, item){
  return `${cat}::custom::${item.id}`;
}
function sdResourceKey(prefix, label){
  return `${prefix}::${makeStableId("resource", label)}`;
}
function moveStateKey(obj, oldKey, newKey){
  if(!obj || oldKey === newKey || obj[oldKey] === undefined) return;
  if(obj[newKey] === undefined) obj[newKey] = obj[oldKey];
  delete obj[oldKey];
}
function createDefaultState(){
  const defaults = {
    schemaVersion: STATE_SCHEMA_VERSION,
    subtopicDone: {},
    dsaDone: {},

  Object.keys(TOPICS).forEach(key=>{

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return migrateState(JSON.parse(raw));
  }catch(e){}
  try{
    const oldRaw = localStorage.getItem("crackr_state_v2");
    if(oldRaw) return migrateState(JSON.parse(oldRaw));
  }catch(e){}
  // try migrating from old v1 key
  try{
    const oldRaw = localStorage.getItem("crackr_state_v1");
    if(oldRaw) return migrateState(JSON.parse(oldRaw));
  }catch(e){}
  return createDefaultState();
}
function migrateState(s){
  const defaults = createDefaultState();
  s = {...defaults, ...(s && typeof s === "object" ? s : {})};
  s.schemaVersion = STATE_SCHEMA_VERSION;
  ["subtopicDone","dsaDone","dsaLog","notes","topicNotes","dsaNotes","dsaRevisions","dsaDifficulty","customDsaCategories","customDsaQuestions","sdNotes","sdChaptersDone","sdItemsDone","customTopics","companyStatus","userSubjects","edits"].forEach(key=>{
    if(!s[key] || typeof s[key] !== "object" || Array.isArray(s[key])) s[key] = defaults[key] || {};
  });
  Object.keys(defaults.edits).forEach(key=>{
    if(!s.edits[key] || typeof s.edits[key] !== "object" || Array.isArray(s.edits[key])) s.edits[key] = {};
  });
  ["customCompanies","personalQA"].forEach(key=>{
    if(!Array.isArray(s[key])) s[key] = [];
  });
  s.personalQA.forEach((qa, idx)=>{
    if(!qa.id) qa.id = makeCustomId(qa.q || `personal-question-${idx + 1}`);
  });
  s.customCompanies.forEach((company, idx)=>{
    if(!company.id) company.id = makeCustomId(company.name || `company-${idx + 1}`);
  });
  Object.keys(TOPICS).forEach(key=>{
    const oldDone = s.subtopicDone[key];
    const nextDone = (oldDone && !Array.isArray(oldDone) && typeof oldDone === "object") ? {...oldDone} : {};
    (TOPICS[key].subtopics || []).forEach((title, idx)=>{
      const stableKey = topicBuiltInKey(key, title);
      const legacyKey = `${key}::${idx}`;
      if(Array.isArray(oldDone) && oldDone[idx] !== undefined) nextDone[stableKey] = !!oldDone[idx];
      if(!Array.isArray(oldDone) && oldDone && oldDone[legacyKey] !== undefined && nextDone[stableKey] === undefined) nextDone[stableKey] = !!oldDone[legacyKey];
      delete nextDone[legacyKey];
      moveStateKey(s.topicNotes, legacyKey, stableKey);
      moveStateKey(s.notes, legacyKey, stableKey);
    });
    s.subtopicDone[key] = nextDone;
    if(!Array.isArray(s.customTopics[key])) s.customTopics[key] = [];
    s.customTopics[key].forEach((item, idx)=>{
      if(!item.id) item.id = makeCustomId(item.title || `topic-${idx + 1}`);
      if(!Array.isArray(item.subtopics)) item.subtopics = [];
      item.subtopics.forEach((sub, subIdx)=>{
        if(!sub.id) sub.id = makeCustomId(sub.title || `subtopic-${subIdx + 1}`);
      });
    });
  });
  DSA_TAB_TOPICS.forEach(cat=>{
    if(!Array.isArray(s.customDsaQuestions[cat])) s.customDsaQuestions[cat] = [];
    DSA_CATEGORIES[cat].questions.forEach((title, idx)=>{
      const stableKey = dsaBuiltInKey(cat, title);
      const legacyKey = `${cat}::${idx}`;
      moveStateKey(s.dsaDone, legacyKey, stableKey);
      moveStateKey(s.dsaNotes, legacyKey, stableKey);
      moveStateKey(s.dsaRevisions, legacyKey, stableKey);
      moveStateKey(s.dsaDifficulty, legacyKey, stableKey);
    });
    s.customDsaQuestions[cat].forEach((item, idx)=>{
      if(!item.id) item.id = makeCustomId(item.title || `question-${idx + 1}`);
      const stableKey = dsaCustomKey(cat, item);
      const legacyKey = `${cat}::custom::${idx}`;
      moveStateKey(s.dsaDone, legacyKey, stableKey);
      moveStateKey(s.dsaNotes, legacyKey, stableKey);
      moveStateKey(s.dsaRevisions, legacyKey, stableKey);
      moveStateKey(s.dsaDifficulty, legacyKey, stableKey);
    });
  });
  Object.keys(s.customDsaCategories || {}).forEach(cat=>{
    if(!s.customDsaCategories[cat].id) s.customDsaCategories[cat].id = cat;
    if(!s.customDsaCategories[cat].label) s.customDsaCategories[cat].label = cat;
    if(!Array.isArray(s.customDsaQuestions[cat])) s.customDsaQuestions[cat] = [];
    s.customDsaQuestions[cat].forEach((item, idx)=>{
      if(!item.id) item.id = makeCustomId(item.title || `question-${idx + 1}`);
    });
  });
  SD_RESOURCES.book.chapters.forEach((label, idx)=>{
    moveStateKey(s.sdChaptersDone, `book::${idx}`, sdResourceKey("book", label));
    moveStateKey(s.sdNotes, `book::${idx}`, sdResourceKey("book", label));
  });
  ["lld","hld"].forEach(prefix=>{
    SD_RESOURCES[prefix].items.forEach((item, idx)=>{
      const key = sdResourceKey(prefix, item.name);
      moveStateKey(s.sdItemsDone, `${prefix}::${idx}`, key);
      moveStateKey(s.sdNotes, `${prefix}::${idx}`, key);
    });
  });
  normalizeStoredNotes(s);
  return s;
}

function applySavedOrder(items, order, getKey){
  if(!Array.isArray(order) || !order.length) return items;
  const rank = new Map(order.map((key, idx)=>[key, idx]));
  return [...items].sort((a,b)=>{
    const ak = getKey(a), bk = getKey(b);
    const ar = rank.has(ak) ? rank.get(ak) : Number.MAX_SAFE_INTEGER;
    const br = rank.has(bk) ? rank.get(bk) : Number.MAX_SAFE_INTEGER;
    return ar === br ? 0 : ar - br;
  });
}
function bindDragReorder(containerSelector, itemSelector, onOrder){
  const containers = document.querySelectorAll(containerSelector);
  containers.forEach(container=>{
    let dragged = null;
    container.querySelectorAll(itemSelector).forEach(item=>{
      item.draggable = true;
      item.addEventListener("dragstart", event=>{
        if(event.target.closest("textarea,input,button,a,select")) {
          event.preventDefault();
          return;
        }
        dragged = item;
        item.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
      });
      item.addEventListener("dragend", ()=>{
        item.classList.remove("dragging");
        dragged = null;
        const order = [...container.querySelectorAll(itemSelector)].map(el=>el.dataset.orderKey).filter(Boolean);
        onOrder(order, container);
      });
    });
    container.addEventListener("dragover", event=>{
      if(!dragged) return;
      event.preventDefault();
      const after = [...container.querySelectorAll(`${itemSelector}:not(.dragging)`)].find(el=>{
        const box = el.getBoundingClientRect();
        return event.clientY < box.top + box.height / 2;
      });
      if(after) container.insertBefore(dragged, after);
      else container.appendChild(dragged);
    });
  });
}

function createDsaCategory(label){
  const cleanLabel = String(label || "").trim();
  if(!cleanLabel) return "";
  const baseKey = stableSlug(cleanLabel);
  if(DSA_CATEGORIES[baseKey]) return baseKey;
  const existing = Object.keys(state.customDsaCategories || {}).find(cat=>{
    const c = state.customDsaCategories[cat];
    return cat === baseKey || stableSlug(c?.label) === baseKey;
  });
  if(existing) return existing;
  let key = baseKey;
  let suffix = 2;
  while(DSA_CATEGORIES[key] || state.customDsaCategories[key]){
    key = `${baseKey}-${suffix++}`;
  }
  state.customDsaCategories[key] = {id:key, label:cleanLabel, playlist:"", questions:[]};
  state.customDsaQuestions[key] = [];
  return key;
}

async function writeRemoteState(){
  const client = getSupabaseClient();
  if(!client){
    setJsonStatus("Local browser cache");
    return;
  }
  if(!currentUser){
    setJsonStatus("Sign in to sync");
    return;
  }
  try{
    const {error} = await client.from(SUPABASE_STATE_TABLE).upsert({
      user_id: currentUser.id,
      state,
      updated_at: new Date().toISOString()
    });
    if(error) throw error;
    setJsonStatus("Supabase saved");
  }catch(err){
    setJsonStatus("Sync failed");
  }
}

async function loadRemoteState(){
  const client = getSupabaseClient();
  if(!client){
    setJsonStatus("Local browser cache");
    updateAuthButton();
    return;
  }
  updateAuthButton();
  if(!currentUser){
    setJsonStatus("Sign in to sync");
    return;
  }
  try{
    const {data, error} = await client
      .from(SUPABASE_STATE_TABLE)
      .select("state")
      .eq("user_id", currentUser.id)
      .maybeSingle();
    if(error) throw error;
    if(data?.state){
      state = migrateState(data.state);
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    } else {
      await writeRemoteState();
    }
    setJsonStatus("Supabase synced");
    renderTabs();
    renderView(localStorage.getItem(ACTIVE_TAB_KEY) || "progress");
    updateStreak();
  }catch(err){
    setJsonStatus("Sync failed");
  }
}

async function bindSupabaseAuth(){
  const btn = document.getElementById("authButton");
  const client = getSupabaseClient();
  if(!client){
    updateAuthButton();
    return;
  }
  const {data} = await client.auth.getSession();
  currentUser = data.session?.user || null;
  updateAuthButton();
  client.auth.onAuthStateChange((event, session)=>{
    const nextUser = session?.user || null;
    const sameUser = (currentUser?.id || null) === (nextUser?.id || null);
    currentUser = nextUser;
    updateAuthButton();
    if(sameUser && (event === "TOKEN_REFRESHED" || event === "INITIAL_SESSION" || event === "SIGNED_IN")){
      setJsonStatus(currentUser ? "Supabase synced" : "Sign in to sync");
      return;
    }
    loadRemoteState();
  });
  if(btn){
    btn.onclick = async ()=>{
      if(currentUser){
        await client.auth.signOut();
        currentUser = null;
        updateAuthButton();
        setJsonStatus("Signed out");
        return;
      }
      const redirectUrl = getSupabaseConfig().redirectUrl || (location.origin + location.pathname);
      const {error} = await client.auth.signInWithOAuth({
        provider:"github",
        options:{redirectTo: redirectUrl}
      });
      if(error){
        setJsonStatus("Auth failed");
        alert(`Supabase sign-in failed: ${error.message}`);
      }
    };
  }
  await loadRemoteState();
}

      if(!Array.isArray(item.links)) item.links = [];

  });
}

    pct: doneMap[topicBuiltInKey(topicKey, title)] ? 100 : 0
  })).filter(item=>!isHidden("topicHidden", item.key));
  const custom = (state.customTopics[topicKey] || []).map((item, idx)=>{
    const total = item.subtopics && item.subtopics.length ? item.subtopics.length : 1;
    const done = item.subtopics && item.subtopics.length ? item.subtopics.filter(st=>st.done).length : (item.done ? 1 : 0);
    return {key:`${topicKey}::custom::${item.id}`, title:item.title, done, total, pct: total ? Math.round((done/total)*100) : 0};
