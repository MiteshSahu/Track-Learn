function findCustomTopic(topicKey, id){
  return (state.customTopics[topicKey] || []).find(item=>item.id === id);
}

function subjectProgressHTML(topicKey){
  const rows = getSubjectItems(topicKey);
  return `
    <div class="compact-progress-card">
      <h3>${TOPICS[topicKey].label} Progress</h3>
      ${rows.map(r=>`
        <div class="topic-bar-row">
          <div class="tname" title="${escapeAttr(r.title)}">${escapeHTML(r.title)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${r.pct}%"></div></div>
          <div class="bval">${r.done}/${r.total}</div>
        </div>
      `).join("") || `<div class="empty" style="padding:18px;">Add your first topic to start tracking.</div>`}
    </div>`;
}

function systemDesignProgressHTML(){
  const rows = [
    {label:"Book Chapters", done:SD_RESOURCES.book.chapters.filter(ch=>!isHidden("sdHidden", sdResourceKey("book", ch)) && state.sdChaptersDone[sdResourceKey("book", ch)]).length, total:SD_RESOURCES.book.chapters.filter(ch=>!isHidden("sdHidden", sdResourceKey("book", ch))).length},
    {label:"LLD Videos", done:SD_RESOURCES.lld.items.filter(it=>!isHidden("sdHidden", sdResourceKey("lld", it.name)) && state.sdItemsDone[sdResourceKey("lld", it.name)]).length, total:SD_RESOURCES.lld.items.filter(it=>!isHidden("sdHidden", sdResourceKey("lld", it.name))).length},
    {label:"HLD Videos", done:SD_RESOURCES.hld.items.filter(it=>!isHidden("sdHidden", sdResourceKey("hld", it.name)) && state.sdItemsDone[sdResourceKey("hld", it.name)]).length, total:SD_RESOURCES.hld.items.filter(it=>!isHidden("sdHidden", sdResourceKey("hld", it.name))).length}
  ].map(r=>({...r, pct:r.total ? Math.round((r.done/r.total)*100) : 0}));
  return `
    <div class="compact-progress-card">
      <h3>System Design Progress</h3>
      ${rows.map(r=>`
        <div class="topic-bar-row">
          <div class="tname">${r.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${r.pct}%"></div></div>
          <div class="bval">${r.done}/${r.total}</div>
        </div>
      `).join("")}
    </div>`;
}

function progressDonutHTML(done, total, label="Complete"){
  const pct = total ? Math.round((done/total)*100) : 0;
  return `
    <div class="donut-card single">
      <div class="donut-wrap" style="--easy:${pct};--medium:0;--hard:0;--solved:${pct}">
        <div class="donut"></div>
        <div class="donut-center"><div><b>${pct}%</b><span>${label}</span></div></div>
      </div>
      <div class="donut-meta">
        <div class="metric"><b>${done}/${total}</b><span>Done</span></div>
        <div class="metric"><b>${Math.max(0,total-done)}</b><span>Remaining</span></div>
      </div>
    </div>`;
}

function renderTopicView(topicKey){
  const topic = TOPICS[topicKey];
  const main = document.getElementById("mainArea");

  if(!state.subtopicDone[topicKey] || Array.isArray(state.subtopicDone[topicKey])) state.subtopicDone[topicKey] = {};
  if(!state.customTopics[topicKey]) state.customTopics[topicKey] = [];
  const doneMap = state.subtopicDone[topicKey];
  const subjectItems = getSubjectItems(topicKey);
  const total = subjectItems.reduce((sum,item)=>sum+item.total,0);
  const completed = subjectItems.reduce((sum,item)=>sum+item.done,0);
  const pct = total ? Math.round((completed/total)*100) : 0;

  const builtInCards = topic.subtopics.map((st,idx)=>{
    const noteKey = topicBuiltInKey(topicKey, st);
    if(isHidden("topicHidden", noteKey)) return null;
    const displayTitle = editedLabel("topicLabels", noteKey, st);
    const note = state.topicNotes[noteKey] || {};
    const noteLinks = note.links || [];
    const hasNote = !!(note.body || noteLinks.length);
    const isOpen = !!openTopicNotePanels[noteKey];
    const linkOpen = !!(openTopicLinkInputs[noteKey] || note.link);
    const idSafe = noteKey.replaceAll("::","-");
    const isDone = !!doneMap[noteKey];
    return {idx, key:noteKey, html:`
    <div class="subtopic-card ${isDone?"done":""}" id="topic-card-${idSafe}" data-order-key="${noteKey}">
    <div class="subtopic-row expandable-row" data-note-key="${noteKey}">
      <input type="checkbox" data-topic="${topicKey}" data-key="${noteKey}" class="subtopic-check" ${isDone?"checked":""}>
      <label class="subtopic-title ${isDone?"done":""}">${escapeHTML(displayTitle)}</label>
      ${hasNote ? `<span class="note-dot">Notes saved</span>` : ""}
      ${editActionsHTML("topic-built-in", noteKey)}
    </div>
    <div class="topic-note-panel ${isOpen?'open':''}">
      <textarea id="topicnotebody-${idSafe}" placeholder="Write the explanation, gotchas, examples, or interview notes for this topic...">${escapeHTML(note.body||"")}</textarea>
      <div class="link-chips">${noteLinksHTML(noteLinks, noteKey, "delete-topic-link")}</div>
      ${linkFormHTML(noteKey, idSafe, linkOpen, "save-topic-link")}
      <div class="row-actions">
        <button class="btn small save-topic-note" data-key="${noteKey}">Save Note</button>
        <button class="btn small secondary add-topic-link" data-key="${noteKey}">${linkOpen?'Hide link':'Add link'}</button>
        <button class="btn small secondary expand-topic-note" data-key="${noteKey}">Expand</button>
        <button class="btn small secondary close-topic-note" data-key="${noteKey}">Close</button>
      </div>
    </div>
    </div>
  `};
  }).filter(Boolean);

  const orderedBuiltInCards = applySavedOrder(builtInCards, state.edits.topicOrder?.[topicKey], item=>item.key);
  let topicsHTML = categorizedTopicHTML(topicKey, orderedBuiltInCards);

  const customTopicCards = state.customTopics[topicKey].map((item,idx)=>{
    const noteKey = `${topicKey}::custom::${item.id}`;
    const hasChildren = item.subtopics && item.subtopics.length;
    const itemTotal = hasChildren ? item.subtopics.length : 1;
    const itemDone = hasChildren ? item.subtopics.filter(st=>st.done).length : (item.done ? 1 : 0);
    const itemPct = itemTotal ? Math.round((itemDone/itemTotal)*100) : 0;
    const checked = hasChildren ? itemDone === itemTotal && itemTotal > 0 : !!item.done;
    const itemLinks = item.links || (item.link ? [{tag:"resource", url:item.link}] : []);
    const hasNote = !!(item.note || itemLinks.length);
    const isOpen = !!openTopicNotePanels[noteKey];
    const linkOpen = !!(openTopicLinkInputs[noteKey] || item.link);
    const idSafe = noteKey.replaceAll("::","-");
    const subFormOpen = openSubtopicForms[noteKey] !== false;
    return {key:noteKey, html:`
    <div class="subtopic-card ${checked?"done":""}" id="topic-card-${idSafe}" data-order-key="${noteKey}">
      <div class="subtopic-row expandable-row" data-note-key="${noteKey}">
        <input type="checkbox" class="custom-topic-check" data-topic="${topicKey}" data-id="${escapeAttr(item.id)}" ${checked?"checked":""}>
        <label class="subtopic-title ${checked?"done":""}">${escapeHTML(item.title)}</label>
        ${hasNote ? `<span class="note-dot">Notes saved</span>` : ""}
        ${editActionsHTML("custom-topic", item.id, `data-topic="${topicKey}"`)}
      </div>
      <div class="subtopic-body">
        <div class="subtopic-progress"><span style="--pct:${itemPct}%"></span></div>
        <div class="nested-list">
          ${(item.subtopics||[]).map((st,subIdx)=>`
            <label class="nested-row">
              <input type="checkbox" class="custom-subtopic-check" data-topic="${topicKey}" data-topic-id="${escapeAttr(item.id)}" data-sub-id="${escapeAttr(st.id)}" ${st.done?"checked":""}>
              <span>${escapeHTML(st.title)}</span>
              ${editActionsHTML("custom-subtopic", st.id, `data-topic="${topicKey}" data-topic-id="${escapeAttr(item.id)}"`)}
            </label>
          `).join("")}
        </div>
        <button class="btn small secondary show-subtopic-form ${subFormOpen?'closed':''}" data-key="${noteKey}">Add subtopic</button>
        <div class="add-subtopic-row ${subFormOpen?'':'closed'}">
          <input type="text" id="new-subtopic-${topicKey}-${item.id}" placeholder="Add a subtopic inside ${escapeAttr(item.title)}">
          <button class="btn small add-custom-subtopic" data-topic="${topicKey}" data-id="${escapeAttr(item.id)}">Add</button>
          <button class="btn small secondary close-subtopic-form" data-key="${noteKey}">Close</button>
        </div>
      </div>
      <div class="topic-note-panel ${isOpen?'open':''}">
        <textarea id="topicnotebody-${idSafe}" placeholder="Write notes for this topic...">${escapeHTML(item.note||"")}</textarea>
        <div class="link-chips">${noteLinksHTML(itemLinks, noteKey, "delete-topic-link")}</div>
        ${linkFormHTML(noteKey, idSafe, linkOpen, "save-topic-link")}
        <div class="row-actions">
          <button class="btn small save-topic-note" data-key="${noteKey}">Save Note</button>
          <button class="btn small secondary add-topic-link" data-key="${noteKey}">${linkOpen?'Hide link':'Add link'}</button>
          <button class="btn small secondary expand-topic-note" data-key="${noteKey}">Expand</button>
          <button class="btn small secondary close-topic-note" data-key="${noteKey}">Close</button>
        </div>
      </div>
    </div>`};
  });
  topicsHTML += applySavedOrder(customTopicCards, state.edits.topicOrder?.[topicKey], item=>item.key).map(item=>item.html).join("");

  main.innerHTML = `
  <div class="view active">
    <div class="view-header">
      <div>
        <h2 class="view-title">${topic.label}</h2>
        <div class="view-desc">${topic.desc}</div>
      </div>
      <div class="view-header-actions">
        ${topicKey === "designpatterns" ? editModeButtonHTML() : `${addTopicControlHTML(topicKey, topic.label)}${editModeButtonHTML()}`}
      </div>
    </div>

    <div class="topic-workspace">
      <div class="topic-main">
        ${pageSearchHTML(topicKey, `Search ${topic.label} topics or notes`)}
        ${jumpTabsHTML(TOPIC_CATEGORY_GROUPS[topicKey])}
        <div class="subtopic-list">
          ${topicsHTML}
        </div>
      </div>
      <div class="topic-side">
        ${progressDonutHTML(completed, total, "Complete")}
        ${subjectProgressHTML(topicKey)}
      </div>
    </div>
  </div>
  `;

  bindSubtopicChecks();
  bindTopicInlineNotes();
  bindCustomTopicControls(topicKey);
  bindTopicEditControls(topicKey);
  bindEditModeToggle(()=>renderTopicView(topicKey));
  bindJumpTabs();
  bindPageSearch(topicKey, [
    ...topic.subtopics.map((label,idx)=>{
      const key = topicBuiltInKey(topicKey, label);
      if(isHidden("topicHidden", key)) return null;
      return {label:editedLabel("topicLabels", key, label), id:`topic-card-${key.replaceAll("::","-")}`, open:()=>{openTopicNotePanels[key]=true; renderTopicView(topicKey);}};
    }).filter(Boolean),
    ...state.customTopics[topicKey].map((item,idx)=>{
      const key = `${topicKey}::custom::${item.id}`;
      return {label:item.title, id:`topic-card-${key.replaceAll("::","-")}`, open:()=>{openTopicNotePanels[key]=true; renderTopicView(topicKey);}};
    })
  ]);
  autoResizeTextareas();
}

function bindSubtopicChecks(){
  document.querySelectorAll(".subtopic-check").forEach(cb=>{
    cb.onchange = ()=>{
      const t = cb.dataset.topic, key = cb.dataset.key;
      if(!state.subtopicDone[t] || Array.isArray(state.subtopicDone[t])) state.subtopicDone[t] = {};
      state.subtopicDone[t][key] = cb.checked;
      save();
      renderPreservingScroll(()=>renderView(t));
    };
  });
}

function bindTopicInlineNotes(){
  document.querySelectorAll(".expandable-row[data-note-key]").forEach(row=>{
    row.onclick = (event)=>{
      if(event.target.closest("input, button, a")) return;
      const key = row.dataset.noteKey;
      openTopicNotePanels[key] = !openTopicNotePanels[key];
      const topicKey = key.split("::")[0];
      renderPreservingScroll(()=>renderTopicView(topicKey));
    };
  });
  document.querySelectorAll(".close-topic-note").forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.key;
      openTopicNotePanels[key] = false;
      renderPreservingScroll(()=>renderTopicView(key.split("::")[0]));
    };
  });
  document.querySelectorAll(".save-topic-note").forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.key;
      const idSafe = key.replaceAll("::","-");
      const body = document.getElementById(`topicnotebody-${idSafe}`).value.trim();
      if(key.includes("::custom::")){
        const [topicKey,,id] = key.split("::");
        const item = findCustomTopic(topicKey, id);
        if(item) item.note = body;
      } else {
        state.topicNotes[key] = {...normalizeNoteObject(state.topicNotes[key]), body};
      }
      save();
      openTopicNotePanels[key] = true;
      clearSaveButtonDirty(btn);
      renderPreservingScroll(()=>renderTopicView(key.split("::")[0]));
    };
  });
  document.querySelectorAll(".save-topic-link").forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.key;
      const idSafe = key.replaceAll("::","-");
      const tag = document.getElementById(`linktag-${idSafe}`).value.trim() || "resource";
      const url = document.getElementById(`linkurl-${idSafe}`).value.trim();
      if(!url) return;
      if(key.includes("::custom::")){
        const [topicKey,,id] = key.split("::");
        const item = findCustomTopic(topicKey, id);
        if(!item) return;
        if(!Array.isArray(item.links)) item.links = [];
        item.links.push({tag, url});
      } else {
        const note = normalizeNoteObject(state.topicNotes[key]);
        note.links.push({tag, url});
        state.topicNotes[key] = note;
      }
      save();
      openTopicNotePanels[key] = true;
      openTopicLinkInputs[key] = false;
      renderPreservingScroll(()=>renderTopicView(key.split("::")[0]));
    };
  });
  document.querySelectorAll(".delete-topic-link").forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.key;
      const idx = +btn.dataset.linkIdx;
      if(key.includes("::custom::")){
        const [topicKey,,id] = key.split("::");
        const item = findCustomTopic(topicKey, id);
        if(item && Array.isArray(item.links)) item.links.splice(idx,1);
      } else {
        const note = normalizeNoteObject(state.topicNotes[key]);
        note.links.splice(idx,1);
        state.topicNotes[key] = note;
      }
      save();
      renderPreservingScroll(()=>renderTopicView(key.split("::")[0]));
    };
  });
  document.querySelectorAll(".add-topic-link").forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.key;
      openTopicLinkInputs[key] = !openTopicLinkInputs[key];
      renderPreservingScroll(()=>renderTopicView(key.split("::")[0]));
    };
  });
  document.querySelectorAll(".expand-topic-note").forEach(btn=>{
    btn.onclick = ()=>{
      btn.closest(".topic-note-panel").classList.toggle("note-expanded");
      btn.textContent = btn.closest(".topic-note-panel").classList.contains("note-expanded") ? "Collapse" : "Expand";
      autoResizeTextareas();
    };
  });
}

function bindCustomTopicControls(topicKey){
  const addBtn = document.getElementById(`addTopic-${topicKey}`);
  if(addBtn){
    addBtn.onclick = ()=>{
      const input = document.getElementById(`newTopic-${topicKey}`);
      const title = input.value.trim();
      if(!title) return;
      if(!state.customTopics[topicKey]) state.customTopics[topicKey] = [];
      state.customTopics[topicKey].push({id:makeCustomId(title), title, done:false, note:"", link:"", subtopics:[]});
      save();
      renderTopicView(topicKey);
    };
  }
  document.querySelectorAll(".custom-topic-check").forEach(cb=>{
    cb.onchange = ()=>{
      const item = findCustomTopic(topicKey, cb.dataset.id);
      if(!item) return;
      if(item.subtopics && item.subtopics.length){
        item.subtopics.forEach(st=>st.done = cb.checked);
      } else {
        item.done = cb.checked;
      }
      save();
      renderPreservingScroll(()=>renderTopicView(topicKey));
    };
  });
  document.querySelectorAll(".custom-subtopic-check").forEach(cb=>{
    cb.onchange = ()=>{
      const item = findCustomTopic(topicKey, cb.dataset.topicId);
      if(!item) return;
      const sub = (item.subtopics || []).find(st=>st.id === cb.dataset.subId);
      if(!sub) return;
      sub.done = cb.checked;
      save();
      renderPreservingScroll(()=>renderTopicView(topicKey));
    };
  });
  document.querySelectorAll(".add-custom-subtopic").forEach(btn=>{
    btn.onclick = ()=>{
      const item = findCustomTopic(topicKey, btn.dataset.id);
      if(!item) return;
      const input = document.getElementById(`new-subtopic-${topicKey}-${item.id}`);
      const title = input.value.trim();
      if(!title) return;
      if(!item.subtopics) item.subtopics = [];
      item.subtopics.push({id:makeCustomId(title), title, done:false});
      item.done = false;
      save();
      renderPreservingScroll(()=>renderTopicView(topicKey));
    };
  });
  document.querySelectorAll(".close-subtopic-form").forEach(btn=>{
    btn.onclick = ()=>{
      openSubtopicForms[btn.dataset.key] = false;
      renderPreservingScroll(()=>renderTopicView(topicKey));
    };
  });
  document.querySelectorAll(".show-subtopic-form").forEach(btn=>{
    btn.onclick = ()=>{
      openSubtopicForms[btn.dataset.key] = true;
      renderPreservingScroll(()=>renderTopicView(topicKey));
    };
  });
  bindDragReorder(".subtopic-list", ".subtopic-card", order=>{
    state.edits.topicOrder[topicKey] = order;
    save();
  });
}

function bindTopicEditControls(topicKey){
  document.querySelectorAll(".edit-item[data-kind='topic-built-in']").forEach(btn=>{
    btn.onclick = (event)=>{
      event.stopPropagation();
      const current = state.edits.topicLabels[btn.dataset.id] || btn.closest(".subtopic-row")?.querySelector(".subtopic-title")?.textContent || "";
      const next = prompt("Edit topic name", current);
      if(!next || !next.trim()) return;
      state.edits.topicLabels[btn.dataset.id] = next.trim();
      save();
      renderTopicView(topicKey);
    };
  });
  document.querySelectorAll(".delete-item[data-kind='topic-built-in']").forEach(btn=>{
    btn.onclick = (event)=>{
      event.stopPropagation();
      if(!confirm("Delete this built-in topic from the visible list? Your old progress stays in saved data.")) return;
      state.edits.topicHidden[btn.dataset.id] = true;
      save();
      renderTopicView(topicKey);
    };
  });
  document.querySelectorAll(".edit-item[data-kind='custom-topic']").forEach(btn=>{
    btn.onclick = (event)=>{
      event.stopPropagation();
      const item = findCustomTopic(topicKey, btn.dataset.id);
      if(!item) return;
      const next = prompt("Edit topic name", item.title);
      if(!next || !next.trim()) return;
      item.title = next.trim();
      save();
      renderTopicView(topicKey);
    };
  });
  document.querySelectorAll(".delete-item[data-kind='custom-topic']").forEach(btn=>{
    btn.onclick = (event)=>{
      event.stopPropagation();
      if(!confirm("Delete this topic and its subtopics?")) return;
      state.customTopics[topicKey] = (state.customTopics[topicKey] || []).filter(item=>item.id !== btn.dataset.id);
      save();
      renderTopicView(topicKey);
    };
  });
  document.querySelectorAll(".edit-item[data-kind='custom-subtopic']").forEach(btn=>{
    btn.onclick = (event)=>{
      event.stopPropagation();
      const item = findCustomTopic(topicKey, btn.dataset.topicId);
      const sub = (item?.subtopics || []).find(st=>st.id === btn.dataset.id);
      if(!sub) return;
      const next = prompt("Edit subtopic name", sub.title);
      if(!next || !next.trim()) return;
      sub.title = next.trim();
      save();
      renderTopicView(topicKey);
    };
  });
  document.querySelectorAll(".delete-item[data-kind='custom-subtopic']").forEach(btn=>{
    btn.onclick = (event)=>{
      event.stopPropagation();
      if(!confirm("Delete this subtopic?")) return;
      const item = findCustomTopic(topicKey, btn.dataset.topicId);
      if(!item) return;
      item.subtopics = (item.subtopics || []).filter(st=>st.id !== btn.dataset.id);
      save();
      renderTopicView(topicKey);
    };
  });
}

function autoResizeTextareas(){
  document.querySelectorAll("textarea").forEach(area=>{
    area.style.height = "auto";
    area.style.height = `${area.scrollHeight + 2}px`;
    area.oninput = ()=> {
      area.style.height = "auto";
      area.style.height = `${area.scrollHeight + 2}px`;
      markNearestSaveButtonDirty(area);
    };
  });
}

function markNearestSaveButtonDirty(input){
  const panel = input.closest(".q-note-panel,.topic-note-panel,.resource-note-panel");
  const btn = panel?.querySelector(".save-q-note,.save-topic-note,.save-sd-note");
  if(btn) btn.classList.add("unsaved");
}

function clearSaveButtonDirty(button){
  button?.classList.remove("unsaved");
}

/* ========================= NOTES PANEL (shared, topic-level) ========================= */

function notesPanelHTML(topicKey){
  const notes = state.notes[topicKey] || [];
  const items = notes.slice().reverse().map((n,revIdx)=>{
    const idx = notes.length - 1 - revIdx;
    return `
    <div class="note-item">
      <div class="meta">
        <span class="tag">${n.tag || "note"}</span>
        <button class="del" data-topic="${topicKey}" data-idx="${idx}">remove</button>
      </div>
      ${n.body ? `<div class="body">${escapeHTML(n.body)}</div>` : ""}
      ${n.link ? `<a class="ylink" href="${escapeAttr(n.link)}" target="_blank" rel="noopener">Open saved link: ${escapeHTML(n.link)}</a>` : ""}
    </div>`;
  }).join("");

  return `
  <div class="notes-panel">
    <h3>Notes & Resources</h3>
    <div class="hint">Save the YouTube link or logic you want to remember for ${TOPICS[topicKey] ? TOPICS[topicKey].label : "this"}. Revisit anytime.</div>

    <input type="text" id="noteTag-${topicKey}" placeholder="Tag (e.g. HashMap internals)" />
    <textarea id="noteBody-${topicKey}" placeholder="Paste the logic / explanation you want to remember..."></textarea>
    <input type="text" id="noteLink-${topicKey}" placeholder="YouTube link (optional)" />
    <button class="btn" id="saveNote-${topicKey}">Save Note</button>

    <div class="notes-list">
      ${items || `<div class="empty" style="padding:20px;">No notes yet. Add your first one above.</div>`}
    </div>
  </div>`;
}

function bindNotesPanel(topicKey){
  const saveBtn = document.getElementById(`saveNote-${topicKey}`);
  if(saveBtn){
    saveBtn.onclick = ()=>{
      const tag = document.getElementById(`noteTag-${topicKey}`).value.trim();
      const body = document.getElementById(`noteBody-${topicKey}`).value.trim();
      const link = document.getElementById(`noteLink-${topicKey}`).value.trim();
      if(!tag && !body && !link) return;
      if(!state.notes[topicKey]) state.notes[topicKey] = [];
      state.notes[topicKey].push({tag, body, link, ts: Date.now()});
      save();
      renderView(topicKey);
    };
  }
  document.querySelectorAll(".note-item .del").forEach(btn=>{
    btn.onclick = ()=>{
      const t = btn.dataset.topic, idx = +btn.dataset.idx;
      state.notes[t].splice(idx,1);
      save();
      renderView(t);
    };
  });
}

function escapeHTML(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escapeAttr(s){
  return String(s).replace(/"/g,"&quot;");
}

function slugify(s){
  return String(s).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
}

function noteLinksHTML(links, key, cls){
  return (links || []).map((l,idx)=>`
    <span class="link-chip">
      <span>${escapeHTML(l.tag || "link")}</span>
      <a href="${escapeAttr(l.url)}" target="_blank" rel="noopener">${escapeHTML(l.url)}</a>

function bindPageSearch(pageKey, items){
  const input = document.getElementById(`search-${pageKey}`);
  const results = document.getElementById(`searchResults-${pageKey}`);
  if(!input || !results) return;
  function go(match){
    if(!match) return;
    match.open?.();
    setTimeout(()=>{
      document.getElementById(match.id)?.scrollIntoView({behavior:"smooth", block:"center"});
    },0);
  }
  function renderResults(forceAll=false){
    const q = input.value.trim().toLowerCase();
    const matches = (q || forceAll) ? items.filter(item=>forceAll || item.label.toLowerCase().includes(q)).slice(0,60) : [];
    results.innerHTML = matches.map((item,idx)=>`<button class="search-result" data-idx="${idx}">${escapeHTML(item.label)}</button>`).join("");
    results.classList.toggle("open", matches.length > 0);
    results._matches = matches;
    results.querySelectorAll(".search-result").forEach(btn=>{
      btn.onclick = ()=>go(results._matches[+btn.dataset.idx]);
    });
  }
  input.oninput = ()=>renderResults(false);
  input.onfocus = ()=>renderResults(false);
  input.onkeydown = (event)=>{
    if(event.key === "Enter"){
      event.preventDefault();
      renderResults(true);
    }
  };
}

function todayStr(){
  return dateKey(new Date());

function dateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function formatDateLabel(d){
  return d.toLocaleDateString(undefined, {month:"short", day:"numeric", year:"numeric"});
}

function revisionClass(count){
  if(count >= 3) return "r3";
  if(count === 2) return "r2";
  if(count === 1) return "r1";
  return "r0";
}

function defaultDsaDifficulty(cat, idx, name){
  const q = name.toLowerCase();
  if(cat === "dp" && idx > 22) return "hard";
  if(cat === "graph" && idx > 22) return "hard";
  if(q.includes("ii") || q.includes("minimum window") || q.includes("median") || q.includes("burst") || q.includes("kosaraju") || q.includes("bridges") || q.includes("articulation") || q.includes("dijkstra") || q.includes("bellman") || q.includes("floyd")) return "hard";
  if(cat === "dp" || cat === "graph") return idx < 8 ? "easy" : "medium";
  if(cat === "recursion") return idx < 5 ? "easy" : idx < 14 ? "medium" : "hard";
  if(cat === "slidingwindow") return idx < 6 ? "easy" : idx < 16 ? "medium" : "hard";
  return "medium";
}

function effectiveDsaDifficulty(cat, idx, name){
  return state.dsaDifficulty[dsaBuiltInKey(cat, name)] || defaultDsaDifficulty(cat, idx, name);
}

function getDsaQuestionItems(cat){
  const category = getDsaCategory(cat) || {questions:[], playlist:""};
  const builtIn = (category.questions || []).map((title, idx)=>({
    key:dsaBuiltInKey(cat, title),
    originalTitle:title,
    title:editedLabel("dsaQuestionLabels", dsaBuiltInKey(cat, title), title),
    link:category.playlist || "",
    difficulty:effectiveDsaDifficulty(cat, idx, title),
    custom:false
  })).filter(item=>!isHidden("dsaQuestionHidden", item.key));
  const custom = (state.customDsaQuestions[cat] || []).map((item, idx)=>{
    const key = dsaCustomKey(cat, item);
    return {
      key,
      title:item.title,
      id:item.id,
      link:item.link || category.playlist || "",
      difficulty:state.dsaDifficulty[key] || item.difficulty || "medium",
      custom:true
    };
  });
  return applySavedOrder([...builtIn, ...custom], state.edits.dsaQuestionOrder?.[cat], item=>item.key);
}

function getDsaDifficultyCounts(){
  const counts = {total:{easy:0, medium:0, hard:0}, solved:{easy:0, medium:0, hard:0}};
  allDsaQuestionItems().forEach(item=>{
    const diff = item.difficulty;
    counts.total[diff]++;
    if(state.dsaDone[item.key]) counts.solved[diff]++;
  });
  return counts;
}

function renderWeeklyChart(){
  const wrap = document.getElementById("weeklyChart");
  if(!wrap) return;
  const today = new Date();
  const days = [];
  for(let i=29;i>=0;i--){
    const d = new Date(today);
    d.setDate(d.getDate()-i);
    const key = dateKey(d);
    days.push({date:d, key, count:state.dsaLog[key] || 0});
  }
  const max = Math.max(1, ...days.map(d=>d.count));
  const width = 900, height = 72, padX = 16, top = 8, bottom = 16;
  const usableW = width - padX*2;
  const usableH = height - top - bottom;
  const points = days.map((d,i)=>{
    const x = padX + (usableW/(days.length-1))*i;
    const y = top + usableH - ((d.count/max)*usableH);
    return {...d, x, y};
  });
  wrap.innerHTML = `
    <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Solved count for the last 30 days">
      <line class="axis" x1="${padX}" y1="${top+usableH}" x2="${width-padX}" y2="${top+usableH}"></line>
      <polyline class="line" points="${points.map(p=>`${p.x},${p.y}`).join(" ")}"></polyline>
      ${points.map(p=>`
        <g>
          <title>${p.count} solved on ${formatDateLabel(p.date)}</title>
          <circle class="dot" cx="${p.x}" cy="${p.y}" r="3.5"></circle>
          <text class="day" x="${p.x}" y="${height-3}" text-anchor="middle">${p.date.getDate()}</text>
        </g>
      `).join("")}
    </svg>`;
  wrap.scrollLeft = wrap.scrollWidth;
}

function renderHeatmap(){
  const hm = document.getElementById("heatmap");
  const today = new Date();
  const startMonth = new Date(today.getFullYear(), today.getMonth() - 12, 1);
  const endMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const monthBlocks = [];

  for(let cursor = new Date(startMonth); cursor <= endMonth; cursor.setMonth(cursor.getMonth()+1)){
    const year = cursor.getFullYear();
    const month = cursor.getMonth();
    const monthName = cursor.toLocaleDateString(undefined, {month:"short"});
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();
    const weeks = Math.ceil((firstDay + daysInMonth) / 7);
    let dayCells = "";

    for(let day=1; day<=daysInMonth; day++){
      const d = new Date(year, month, day);
      if(d > today) continue;
      const dayOffset = firstDay + day - 1;
      const col = Math.floor(dayOffset / 7) + 1;
      const row = d.getDay() + 1;
      const key = dateKey(d);
      const count = state.dsaLog[key] || 0;
      let cls = "cell";
      if(count>=1 && count<2) cls += " l1";
      else if(count>=2 && count<4) cls += " l2";
      else if(count>=4 && count<6) cls += " l3";
      else if(count>=6) cls += " l4";
      dayCells += `<div class="${cls}" style="grid-column:${col};grid-row:${row}" title="${count} solved on ${formatDateLabel(d)}"></div>`;
    }

    monthBlocks.push(`
      <div class="activity-month">
        <div class="month-label">${monthName}</div>
        <div class="month-grid" style="--weeks:${weeks}">${dayCells}</div>
      </div>`);
  }

  hm.innerHTML = monthBlocks.join("");
  hm.closest(".heatmap-shell").scrollLeft = hm.closest(".heatmap-shell").scrollWidth;
}

    state.personalQA.push({id:makeCustomId(q), q, a, ts: Date.now()});
    save();
    renderPersonalView();
  };

  document.querySelectorAll(".qa-item .danger").forEach(btn=>{
    btn.onclick = ()=>{
      state.personalQA = state.personalQA.filter(qa=>qa.id !== btn.dataset.id);
      save();
      renderPersonalView();
    };
  });
  document.querySelectorAll(".edit-qa").forEach(btn=>{
    btn.onclick = ()=>{
      const qa = state.personalQA.find(item=>item.id === btn.dataset.id);
      if(!qa) return;
      const q = prompt("Edit question", qa.q);
      if(!q || !q.trim()) return;
      const a = prompt("Edit answer", qa.a);
      if(a === null) return;
      qa.q = q.trim();
      qa.a = a.trim();
      save();
      renderPersonalView();
    };
  });
  bindEditModeToggle(renderPersonalView);
  bindPageSearch("personal", state.personalQA.map(qa=>({label:qa.q, id:`qa-${qa.id}`, open:()=>{}})));
}

/* ========================= MASTER ROUTER ========================= */

function getTopicProgress(topicKey){
  const topic = TOPICS[topicKey];
  const doneMap = state.subtopicDone[topicKey] || {};
  const visibleBuiltIns = topic.subtopics.filter(title=>!isHidden("topicHidden", topicBuiltInKey(topicKey, title)));
  let total = visibleBuiltIns.length;
  let done = visibleBuiltIns.filter(title=>doneMap[topicBuiltInKey(topicKey, title)]).length;
  (state.customTopics[topicKey] || []).forEach(item=>{
    if(item.subtopics && item.subtopics.length){
      total += item.subtopics.length;
      done += item.subtopics.filter(st=>st.done).length;
    } else {
      total += 1;
      if(item.done) done += 1;
    }
  });
  return {done, total, pct: total ? Math.round((done/total)*100) : 0};
}

function getDsaProgress(){
  let total = 0, done = 0;
  getDsaCategoryKeys().forEach(cat=>{
    const qs = getDsaQuestionItems(cat);
    total += qs.length;
    qs.forEach(item=>{ if(state.dsaDone[item.key]) done++; });
  });
  return {done, total, pct: total ? Math.round((done/total)*100) : 0};
}

function getSystemDesignProgress(){
  const bookItems = SD_RESOURCES.book.chapters.filter(ch=>!isHidden("sdHidden", sdResourceKey("book", ch)));
  const lldItems = SD_RESOURCES.lld.items.filter(it=>!isHidden("sdHidden", sdResourceKey("lld", it.name)));
  const hldItems = SD_RESOURCES.hld.items.filter(it=>!isHidden("sdHidden", sdResourceKey("hld", it.name)));
  const bookTotal = bookItems.length;
  const bookDone = bookItems.filter(ch=>state.sdChaptersDone[sdResourceKey("book", ch)]).length;
  const lldTotal = lldItems.length;
  const lldDone = lldItems.filter(it=>state.sdItemsDone[sdResourceKey("lld", it.name)]).length;
  const hldTotal = hldItems.length;
  const hldDone = hldItems.filter(it=>state.sdItemsDone[sdResourceKey("hld", it.name)]).length;
  const total = bookTotal + lldTotal + hldTotal;
  const done = bookDone + lldDone + hldDone;
  return {done, total, pct: total ? Math.round((done/total)*100) : 0};
}

function getPersonalProgress(){
  const done = state.personalQA.length;
  const total = Math.max(5, done);
  return {done, total, pct: total ? Math.round((done/total)*100) : 0};
}

function getApplicationsProgress(){
  const companies = getAllCompanies();
  const total = companies.length * 3;
  const done = companies.reduce((sum,c)=>{
    const st = state.companyStatus[c.key] || {};
    return sum + (st.portal?1:0) + (st.referral?1:0) + (st.hr?1:0);
  },0);
  return {done, total, pct: total ? Math.round((done/total)*100) : 0};
}

function getProgressNodes(){
  return TAB_ORDER.filter(t=>t.key!=="progress").map((tab,idx)=>{
    let progress;
    if(tab.key==="dsa") progress = getDsaProgress();
    else if(tab.key==="systemdesign") progress = getSystemDesignProgress();
    else if(tab.key==="applications") progress = getApplicationsProgress();
    else if(tab.key==="personal") progress = getPersonalProgress();
    else progress = getTopicProgress(tab.key);
    return {
      ...tab,
      ...progress,
      phase: `Phase ${idx + 1}`,
      status: progress.pct === 100 ? "complete" : progress.pct > 0 ? "active" : "locked"
    };
  });
}

let openTreeNodes = {};

function progressChildren(key){
  if(key === "dsa"){
    return getDsaCategoryKeys().map(cat=>{
      const qs = getDsaQuestionItems(cat);
      const done = qs.filter(item=>state.dsaDone[item.key]).length;
      return {label:getDsaCategoryLabel(cat), done, total:qs.length};
    });
  }
  if(key === "systemdesign"){
    const bookItems = SD_RESOURCES.book.chapters.filter(ch=>!isHidden("sdHidden", sdResourceKey("book", ch)));
    const lldItems = SD_RESOURCES.lld.items.filter(it=>!isHidden("sdHidden", sdResourceKey("lld", it.name)));
    const hldItems = SD_RESOURCES.hld.items.filter(it=>!isHidden("sdHidden", sdResourceKey("hld", it.name)));
    return [
      {label:"Book", done:bookItems.filter(ch=>state.sdChaptersDone[sdResourceKey("book", ch)]).length, total:bookItems.length},
      {label:"LLD", done:lldItems.filter(it=>state.sdItemsDone[sdResourceKey("lld", it.name)]).length, total:lldItems.length},
      {label:"HLD", done:hldItems.filter(it=>state.sdItemsDone[sdResourceKey("hld", it.name)]).length, total:hldItems.length}
    ];
  }
  if(key === "applications"){
    return ["Applied via portal","Asked for referral","Pinged HR"].map((label,idx)=>{
      const field = ["portal","referral","hr"][idx];
      const companies = getAllCompanies();
      const done = companies.filter(c=>(state.companyStatus[c.key] || {})[field]).length;
      return {label, done, total:companies.length};
    });
  }
  if(TOPICS[key]) return getSubjectItems(key).map(i=>({label:i.title, done:i.done, total:i.total}));
  return [];
}

function branchColor(idx){
  return ["#7b61ff","#b531d9","#1b91c9","#17a671","#e28f2d","#d33d6a","#8a42d6","#0f766e","#dbb72c","#3276d9","#595f68","#20a36b"][idx % 12];
}

/* ========================= FLOATING 3D PIE WIDGET ========================= */

function pieOverviewHTML(){
  return `
    <div class="pie-widget" id="pieWidget">
      <button class="pie-toggle" id="pieToggle" title="Progress overview">
        <div class="pie-3d" id="pie3d"></div>
        <div class="pie-center" id="pieCenterPct">0%</div>
      </button>
      <div class="pie-panel" id="piePanel">
        <h4><span>Progress Overview</span><span class="pie-overall" id="pieOverallPct">0%</span></h4>
        <div class="pie-legend" id="pieLegend"></div>
      </div>
    </div>`;
}

function renderPieWidget(){
  const pie3d = document.getElementById("pie3d");
  const legend = document.getElementById("pieLegend");
  const centerPct = document.getElementById("pieCenterPct");
  const overallPct = document.getElementById("pieOverallPct");
  if(!pie3d || !legend) return;

  const nodes = getProgressNodes();
  const total = nodes.reduce((sum,n)=>sum+n.total,0);
  const done = nodes.reduce((sum,n)=>sum+n.done,0);
  const pct = total ? Math.round((done/total)*100) : 0;

  let stops = [];
  let acc = 0;
  nodes.forEach((n,idx)=>{
    const slice = 100 / nodes.length;
    const start = acc;
    const end = acc + slice;
    const progressEnd = start + (slice * (n.pct / 100));
    if(progressEnd > start){
      stops.push(`${branchColor(idx)} ${start}% ${progressEnd}%`);
    }
    stops.push(`#e4ebe4 ${progressEnd}% ${end}%`);
    acc = end;
  });
  pie3d.style.background = `conic-gradient(${stops.join(", ")})`;

  centerPct.textContent = pct + "%";
  overallPct.textContent = `${done}/${total} · ${pct}%`;

  legend.innerHTML = nodes.map((n,idx)=>`
    <div class="pie-legend-row">
      <span class="dot" style="background:${branchColor(idx)}"></span>
      <span class="lbl">${n.label}</span>
      <span class="val">${n.done}/${n.total} · ${n.pct}%</span>
    </div>
  `).join("");
}

function bindPieWidget(){
  renderPieWidget();
}

/* ========================= PROGRESS TREE (pan/zoom mind map) ========================= */

let treeZoom = 1;
let treePan = {x: 40, y: 40};

function renderProgressTreeView(){
  const main = document.getElementById("mainArea");
  const nodes = getProgressNodes();
  const total = nodes.reduce((sum,n)=>sum+n.total,0);
  const done = nodes.reduce((sum,n)=>sum+n.done,0);
  const pct = total ? Math.round((done/total)*100) : 0;
  const activeTabs = nodes.filter(n=>n.pct>0 && n.pct<100).length;

  main.innerHTML = `
  <div class="view active">
    <h2 class="view-title">Overall Progress Tree</h2>
    <div class="view-desc">A single connected map of your DSA, Java, backend, data, system design, and personal prep progress. Drag to pan, scroll/pinch to zoom.</div>

    <div class="tree-dashboard">
      <section class="tree-card">
        <div class="tree-head">
          <div>
            <h3>Skill Tree</h3>
            <div class="tree-count">${activeTabs} active paths · ${pct}% overall</div>
          </div>
        </div>
        <div class="tree-canvas-viewport" id="treeViewport">
          <div class="tree-hint">🖐 Drag to pan · scroll to zoom</div>
          <div class="tree-canvas" id="treeCanvas">
            <svg class="tree-connectors" id="treeConnectors"></svg>
            ${pieOverviewHTML()}
            <div class="tree-node-card root" id="tree-root" style="left:30px;top:660px;">
              <div class="tree-node-title">Track &amp; Learn</div>
              <div class="tree-node-bar"><span style="width:${pct}%;--node-color:#fff;"></span></div>
              <div class="tree-node-meta"><span>${pct}% complete</span><span>${done}/${total}</span></div>
            </div>
            ${nodes.map((n,idx)=>{
              const color = branchColor(idx);
              const isOpen = !!openTreeNodes[n.key];
              const children = progressChildren(n.key);
              return `
              <div class="tree-node-card branch ${n.status==='complete'?'complete':''}" data-key="${n.key}" id="tree-node-${n.key}" style="--node-color:${color};">
                <div class="tree-node-title">
                  <span>${n.label}</span>
                  <span class="tree-node-count">${n.done}/${n.total}</span>
                </div>
                <div class="tree-node-bar"><span style="width:${n.pct}%;"></span></div>
                <div class="tree-node-meta">
                  <span class="tree-node-expand" data-key="${n.key}">${children.length ? (isOpen ? '▾ Collapse' : '▸ Expand') : ''}</span>
                  <span class="open-link" data-key="${n.key}">${n.pct}% · Open ↗</span>
                </div>
              </div>
              ${children.map((ch,cidx)=>{
                if(!isOpen) return "";
                const cp = ch.total ? Math.round((ch.done/ch.total)*100) : 0;
                const childKey = `${n.key}::child::${cidx}`;
                return `
                <div class="tree-node-card child" data-parent="${n.key}" id="tree-child-${childKey.replaceAll('::','-')}" style="--node-color:${color};width:184px;">
                  <div class="tree-node-title"><span style="font-size:.78rem;">${escapeHTML(ch.label)}</span></div>
                  <div class="tree-node-bar"><span style="width:${cp}%;"></span></div>
                  <div class="tree-node-meta"><span>${cp}%</span><span>${ch.done}/${ch.total}</span></div>
                </div>`;
              }).join("")}
              `;
            }).join("")}
          </div>
          <div class="tree-zoom-controls">
            <button id="treeZoomOut">−</button>
            <div class="tree-zoom-pct" id="treeZoomPct">100%</div>
            <button id="treeZoomIn">+</button>
          </div>
          <button class="tree-reset-btn" id="treeResetView">Reset view</button>
        </div>
      </section>
    </div>
  </div>
  `;

  renderPieWidget();
  layoutTreeNodes(nodes);
  bindTreeInteractions(nodes);
  applyTreeTransform();
}

function layoutTreeNodes(nodes){
  const canvas = document.getElementById("treeCanvas");
  const COL_X = 320;       // x position of branch column
  const ROW_GAP = 130;     // vertical gap between branch nodes
  const CHILD_GAP = 110;   // vertical gap between stacked children
  const CHILD_X = 620;     // x position of child column
  const START_Y = 30;

  let y = START_Y;
  let maxY = START_Y;
  let maxX = COL_X + 230;

  nodes.forEach(n=>{
    const card = document.getElementById(`tree-node-${n.key}`);
    if(!card) return;
    card.style.left = COL_X + "px";
    card.style.top = y + "px";
    card.dataset.cx = COL_X;
    card.dataset.cy = y;

    const children = progressChildren(n.key);
    const isOpen = !!openTreeNodes[n.key];
    if(isOpen && children.length){
      let cy = y - (children.length-1) * CHILD_GAP / 2;
      children.forEach((ch,cidx)=>{
        const childKey = `${n.key}::child::${cidx}`;
        const childEl = document.getElementById(`tree-child-${childKey.replaceAll('::','-')}`);
        if(childEl){
          childEl.style.left = CHILD_X + "px";
          childEl.style.top = cy + "px";
          childEl.dataset.cx = CHILD_X;
          childEl.dataset.cy = cy;
          maxY = Math.max(maxY, cy + 90);
        }
        cy += CHILD_GAP;
      });
      maxX = Math.max(maxX, CHILD_X + 210);
    }

    maxY = Math.max(maxY, y + 90);
    y += ROW_GAP;
  });

  // position root vertically centered
  const root = document.getElementById("tree-root");
  if(root){
    const rootY = START_Y + (y - START_Y)/2 - 30;
    root.style.top = rootY + "px";
    root.dataset.cx = 30;
    root.dataset.cy = rootY;
    maxY = Math.max(maxY, rootY + 90);
  }

  canvas.style.height = (maxY + 60) + "px";
  canvas.style.width = (maxX + 60) + "px";

  drawTreeConnectors(nodes);
}

function drawTreeConnectors(nodes){
  const svg = document.getElementById("treeConnectors");
  const root = document.getElementById("tree-root");
  if(!root) return;
  const rootRight = {x: parseFloat(root.dataset.cx) + 190, y: parseFloat(root.dataset.cy) + 38};

  let paths = "";
  nodes.forEach((n,idx)=>{
    const card = document.getElementById(`tree-node-${n.key}`);
    if(!card) return;
    const color = branchColor(idx);
    const left = {x: parseFloat(card.dataset.cx), y: parseFloat(card.dataset.cy) + 38};
    paths += connectorPath(rootRight, left, color);

    const isOpen = !!openTreeNodes[n.key];
    const children = progressChildren(n.key);
    if(isOpen){
      const right = {x: parseFloat(card.dataset.cx) + 208, y: parseFloat(card.dataset.cy) + 38};
      children.forEach((ch,cidx)=>{
        const childKey = `${n.key}::child::${cidx}`;
        const childEl = document.getElementById(`tree-child-${childKey.replaceAll('::','-')}`);
        if(!childEl) return;
        const cLeft = {x: parseFloat(childEl.dataset.cx), y: parseFloat(childEl.dataset.cy) + 32};
        paths += connectorPath(right, cLeft, color);
      });
    }
  });

  svg.innerHTML = paths;
}

function connectorPath(from, to, color){
  const dx = Math.max(40, (to.x - from.x) * 0.5);
  const d = `M ${from.x} ${from.y} C ${from.x+dx} ${from.y}, ${to.x-dx} ${to.y}, ${to.x} ${to.y}`;
  return `<path d="${d}" stroke="${color}"></path>`;
}

function applyTreeTransform(){
  const canvas = document.getElementById("treeCanvas");
  if(!canvas) return;
  canvas.style.transform = `translate(${treePan.x}px, ${treePan.y}px) scale(${treeZoom})`;
  const pctLabel = document.getElementById("treeZoomPct");
  if(pctLabel) pctLabel.textContent = Math.round(treeZoom*100) + "%";
}

function setTreeZoom(newZoom, viewport){
  const old = treeZoom;
  newZoom = Math.min(2, Math.max(0.4, newZoom));
  if(viewport){
    // zoom around viewport center
    const rect = viewport.getBoundingClientRect();
    const cx = rect.width/2;
    const cy = rect.height/2;
    treePan.x = cx - ((cx - treePan.x) / old) * newZoom;
    treePan.y = cy - ((cy - treePan.y) / old) * newZoom;
  }
  treeZoom = newZoom;
  applyTreeTransform();
}

function bindTreeInteractions(nodes){
  const viewport = document.getElementById("treeViewport");
  const canvas = document.getElementById("treeCanvas");
  if(!viewport || !canvas) return;

  // Expand/collapse
  document.querySelectorAll(".tree-node-expand").forEach(el=>{
    if(!el.textContent.trim()) return;
    el.onclick = (e)=>{
      e.stopPropagation();
      const key = el.dataset.key;
      openTreeNodes[key] = !openTreeNodes[key];
      renderProgressTreeView();
    };
  });

  document.querySelectorAll(".tree-node-card.branch").forEach(card=>{
    card.onclick = (e)=>{
      if(e.target.closest(".open-link")) return;
      const key = card.dataset.key;
      if(!progressChildren(key).length) return;
      openTreeNodes[key] = !openTreeNodes[key];
      renderProgressTreeView();
    };
  });

  // Open tab
  document.querySelectorAll(".open-link").forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      switchTab(el.dataset.key);
    };
  });

  // Pan via drag
  let dragging = false, startX=0, startY=0, startPanX=0, startPanY=0;
  viewport.addEventListener("pointerdown", (e)=>{
    if(e.target.closest(".tree-zoom-controls") || e.target.closest(".tree-reset-btn")) return;
    if(e.target.closest(".tree-node-expand") || e.target.closest(".open-link")) return;
    dragging = true;
    viewport.classList.add("dragging");
    startX = e.clientX; startY = e.clientY;
    startPanX = treePan.x; startPanY = treePan.y;
    viewport.setPointerCapture(e.pointerId);
  });
  viewport.addEventListener("pointermove", (e)=>{
    if(!dragging) return;
    treePan.x = startPanX + (e.clientX - startX);
    treePan.y = startPanY + (e.clientY - startY);
    applyTreeTransform();
  });
  viewport.addEventListener("pointerup", (e)=>{
    dragging = false;
    viewport.classList.remove("dragging");
  });
  viewport.addEventListener("pointerleave", ()=>{
    dragging = false;
    viewport.classList.remove("dragging");
  });

  // Zoom via wheel (pinch on trackpad sends ctrlKey+wheel, mouse wheel works too)
  viewport.addEventListener("wheel", (e)=>{
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.08 : 0.08;
    setTreeZoom(treeZoom + delta, viewport);
  }, {passive:false});

  // Pinch via touch (two-finger)
  let pinchStartDist = null, pinchStartZoom = 1;
  viewport.addEventListener("touchmove", (e)=>{
    if(e.touches.length === 2){
      e.preventDefault();
      const [t1,t2] = e.touches;
      const dist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
      if(pinchStartDist === null){
        pinchStartDist = dist;
        pinchStartZoom = treeZoom;
      } else {
        setTreeZoom(pinchStartZoom * (dist/pinchStartDist), viewport);
      }
    }
  }, {passive:false});
  viewport.addEventListener("touchend", (e)=>{
    if(e.touches.length < 2) pinchStartDist = null;
  });

  // Zoom buttons
  document.getElementById("treeZoomOut").onclick = ()=> setTreeZoom(treeZoom - 0.15, viewport);
  document.getElementById("treeZoomIn").onclick = ()=> setTreeZoom(treeZoom + 0.15, viewport);

  // Reset view
  document.getElementById("treeResetView").onclick = ()=>{
    treeZoom = 1;
    treePan = {x: 40, y: 40};
    applyTreeTransform();
  };
}

function renderView(key){
  if(key==="progress") renderProgressTreeView();
  else if(key==="dsa") renderDSAView();
  else if(key==="systemdesign") renderSystemDesignView();
  else if(key==="applications") renderApplicationsView();
  else if(key==="personal") renderPersonalView();
  else renderTopicView(key);
}

/* ========================= STREAK ========================= */

function computeStreak(){
  let streak = 0;
  let d = new Date();
  let key = todayStr();
  if(!state.dsaLog[key]){
    d.setDate(d.getDate()-1);
  }
  while(true){
    const k = dateKey(d);
    if(state.dsaLog[k] && state.dsaLog[k] > 0){
      streak++;
      d.setDate(d.getDate()-1);
    } else break;
  }
  return streak;
}

function updateStreak(){
  document.getElementById("streakCount").textContent = computeStreak();
}

/* ========================= INIT ========================= */

renderTabs();
renderView(localStorage.getItem(ACTIVE_TAB_KEY) || "progress");
updateStreak();
renderPieWidget();
bindPieWidget();
bindSupabaseAuth();

</script>
